<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5, viewport-fit=cover" />

    <!-- Prevent browsers from caching the HTML shell across deploys -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- PWA / Mobile Web App -->
    <meta name="theme-color" content="#0b1120" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RasoKart" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>RasoKart - Payment Gateway</title>
    <meta name="description" content="RasoKart — Premium Payment Gateway. Accept payments via QR codes, virtual accounts, and payment links." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://rasokart.com/" />

    <!-- Open Graph -->
    <meta property="og:site_name" content="RasoKart" />
    <meta property="og:title" content="RasoKart - Payment Gateway" />
    <meta property="og:description" content="RasoKart — Premium Payment Gateway. Accept payments via QR codes, virtual accounts, and payment links." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://rasokart.com/" />
    <meta property="og:image" content="https://rasokart.com/opengraph.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="RasoKart Payment Gateway" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@rasokart" />
    <meta name="twitter:title" content="RasoKart - Payment Gateway" />
    <meta name="twitter:description" content="RasoKart — Premium Payment Gateway. Accept payments via QR codes, virtual accounts, and payment links." />
    <meta name="twitter:image" content="https://rasokart.com/opengraph.jpg" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="apple-touch-icon-precomposed" href="/favicon.svg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
