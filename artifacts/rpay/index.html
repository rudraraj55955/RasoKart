<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />

    <!-- PWA / Mobile Web App -->
    <meta name="theme-color" content="#0b1120" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RasoKart" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>RasoKart - Payment Gateway</title>
    <meta name="description" content="RasoKart — Premium Payment Gateway. Accept payments via QR codes, virtual accounts, and payment links." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://rasokart.com/" />

    <!-- Open Graph -->
    <meta property="og:site_name" content="RasoKart" />
    <meta property="og:title" content="RasoKart - Payment Gateway" />
    <meta property="og:description" content="RasoKart — Premium Payment Gateway. Accept payments via QR codes, virtual accounts, and payment links." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://rasokart.com/" />
    <meta property="og:image" content="https://rasokart.com/opengraph.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="RasoKart Payment Gateway" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@rasokart" />
    <meta name="twitter:title" content="RasoKart - Payment Gateway" />
    <meta name="twitter:description" content="RasoKart — Premium Payment Gateway. Accept payments via QR codes, virtual accounts, and payment links." />
    <meta name="twitter:image" content="https://rasokart.com/opengraph.jpg" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="apple-touch-icon-precomposed" href="/favicon.svg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  
<script id="rasokart-fold-mobile-polish">
(function () {
  var MOBILE = 900;
  function isMobile(){ return window.innerWidth <= MOBILE; }
  function txt(el){ return (el.textContent || "").replace(/\s+/g, " ").trim(); }
  function imp(el, prop, val){ if (el && el.style) el.style.setProperty(prop, val, "important"); }

  function hideMobileNavExtras(){
    if (!isMobile()) return;
    var hide = {"Services":1,"Dashboard":1,"Settlement":1,"Plans":1,"Contact":1};
    document.querySelectorAll("header *, nav *").forEach(function(el){
      var t = txt(el);
      if (hide[t]) imp(el, "display", "none");
    });
  }

  function compactHero(){
    if (!isMobile()) return;
    if (location.pathname !== "/" && location.pathname !== "") return;

    var h1 = Array.prototype.slice.call(document.querySelectorAll("h1")).find(function(el){
      return txt(el).indexOf("Collect Smarter") !== -1;
    });
    if (!h1) return;

    var hero = h1.closest("section") || h1.parentElement;
    var main = document.querySelector("main");

    if (main) {
      imp(main, "padding-top", "0px");
      imp(main, "margin-top", "0px");
    }

    if (hero) {
      imp(hero, "min-height", "auto");
      imp(hero, "height", "auto");
      imp(hero, "padding-top", "18px");
      imp(hero, "padding-bottom", "36px");
      imp(hero, "display", "block");
      imp(hero, "align-items", "flex-start");
      imp(hero, "justify-content", "flex-start");
      imp(hero, "overflow", "hidden");
    }

    var node = h1;
    var depth = 0;
    while (node && depth < 12) {
      imp(node, "min-height", "auto");
      imp(node, "height", "auto");
      imp(node, "padding-top", "0px");
      imp(node, "margin-top", "0px");
      imp(node, "transform", "none");
      imp(node, "translate", "none");
      imp(node, "align-items", "flex-start");
      imp(node, "justify-content", "flex-start");
      if (node.tagName && node.tagName.toLowerCase() === "main") break;
      node = node.parentElement;
      depth++;
    }

    if (hero) {
      hero.querySelectorAll("*").forEach(function(el){
        var cs = window.getComputedStyle(el);
        var mt = parseFloat(cs.marginTop) || 0;
        var pt = parseFloat(cs.paddingTop) || 0;
        var mh = parseFloat(cs.minHeight) || 0;

        if (mt > 80) imp(el, "margin-top", "0px");
        if (pt > 80) imp(el, "padding-top", "0px");
        if (mh > 360) imp(el, "min-height", "auto");

        if ((cs.alignItems || "").includes("center")) imp(el, "align-items", "flex-start");
        if ((cs.justifyContent || "").includes("center")) imp(el, "justify-content", "flex-start");
      });
    }

    imp(h1, "font-size", "clamp(34px, 8.5vw, 48px)");
    imp(h1, "line-height", "1.08");
    imp(h1, "margin-top", "0px");

    var badge = Array.prototype.slice.call(document.querySelectorAll("span,div,p")).find(function(el){
      return txt(el).indexOf("Leading Payment Infrastructure") !== -1;
    });
    if (badge) {
      imp(badge, "margin-top", "0px");
    }
  }

  function run(){
    hideMobileNavExtras();
    compactHero();
  }

  function start(){
    run();
    setTimeout(run, 100);
    setTimeout(run, 500);
    setTimeout(run, 1200);
    window.addEventListener("resize", run);
    window.addEventListener("orientationchange", function(){ setTimeout(run, 300); });
    new MutationObserver(run).observe(document.body, {childList:true, subtree:true});
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", start, {once:true});
  } else {
    start();
  }
})();
</script>

</body>
</html>
