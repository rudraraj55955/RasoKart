<script id="rasokart-fold-mobile-polish">
(function () {
  var MOBILE = 900;
  function isMobile(){ return window.innerWidth <= MOBILE; }
  function txt(el){ return (el.textContent || "").replace(/\s+/g, " ").trim(); }
  function imp(el, prop, val){ if (el && el.style) el.style.setProperty(prop, val, "important"); }

  function hideMobileNavExtras(){
    if (!isMobile()) return;
    var hide = {"Services":1,"Dashboard":1,"Settlement":1,"Plans":1,"Contact":1};
    document.querySelectorAll("header *, nav *").forEach(function(el){
      var t = txt(el);
      if (hide[t]) imp(el, "display", "none");
    });
  }

  function compactHero(){
    if (!isMobile()) return;
    if (location.pathname !== "/" && location.pathname !== "") return;

    var h1 = Array.prototype.slice.call(document.querySelectorAll("h1")).find(function(el){
      return txt(el).indexOf("Collect Smarter") !== -1;
    });
    if (!h1) return;

    var hero = h1.closest("section") || h1.parentElement;
    var main = document.querySelector("main");

    if (main) {
      imp(main, "padding-top", "0px");
      imp(main, "margin-top", "0px");
    }

    if (hero) {
      imp(hero, "min-height", "auto");
      imp(hero, "height", "auto");
      imp(hero, "padding-top", "18px");
      imp(hero, "padding-bottom", "36px");
      imp(hero, "display", "block");
      imp(hero, "align-items", "flex-start");
      imp(hero, "justify-content", "flex-start");
      imp(hero, "overflow", "hidden");
    }

    var node = h1;
    var depth = 0;
    while (node && depth < 12) {
      imp(node, "min-height", "auto");
      imp(node, "height", "auto");
      imp(node, "padding-top", "0px");
      imp(node, "margin-top", "0px");
      imp(node, "transform", "none");
      imp(node, "translate", "none");
      imp(node, "align-items", "flex-start");
      imp(node, "justify-content", "flex-start");
      if (node.tagName && node.tagName.toLowerCase() === "main") break;
      node = node.parentElement;
      depth++;
    }

    if (hero) {
      hero.querySelectorAll("*").forEach(function(el){
        var cs = window.getComputedStyle(el);
        var mt = parseFloat(cs.marginTop) || 0;
        var pt = parseFloat(cs.paddingTop) || 0;
        var mh = parseFloat(cs.minHeight) || 0;

        if (mt > 80) imp(el, "margin-top", "0px");
        if (pt > 80) imp(el, "padding-top", "0px");
        if (mh > 360) imp(el, "min-height", "auto");

        if ((cs.alignItems || "").includes("center")) imp(el, "align-items", "flex-start");
        if ((cs.justifyContent || "").includes("center")) imp(el, "justify-content", "flex-start");
      });
    }

    imp(h1, "font-size", "clamp(34px, 8.5vw, 48px)");
    imp(h1, "line-height", "1.08");
    imp(h1, "margin-top", "0px");

    var badge = Array.prototype.slice.call(document.querySelectorAll("span,div,p")).find(function(el){
      return txt(el).indexOf("Leading Payment Infrastructure") !== -1;
    });
    if (badge) {
      imp(badge, "margin-top", "0px");
    }
  }

  function run(){
    hideMobileNavExtras();
    compactHero();
  }

  function start(){
    run();
    setTimeout(run, 100);
    setTimeout(run, 500);
    setTimeout(run, 1200);
    window.addEventListener("resize", run);
    window.addEventListener("orientationchange", function(){ setTimeout(run, 300); });
    new MutationObserver(run).observe(document.body, {childList:true, subtree:true});
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", start, {once:true});
  } else {
    start();
  }
})();
</script>


<!-- RASOKART_TOKEN_MASK_START -->
<style>
  .rk-token-copy-btn{
    margin-left:10px;
    padding:6px 10px;
    border-radius:10px;
    border:1px solid rgba(56,189,248,.35);
    background:rgba(14,165,233,.14);
    color:#e0f2fe;
    font-size:12px;
    font-weight:700;
    cursor:pointer;
    white-space:nowrap;
  }
  .rk-token-copy-btn:active{transform:scale(.98)}
  .rk-token-hidden{display:none!important}
</style>
<script>
(function(){
  var JWT_RE = /\beyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}\b/g;

  function isDocsRoute(){
    return /(^|\/)(api-docs|merchant\/api-docs|admin\/api-docs)(\/|$)/i.test(location.pathname);
  }

  function isSecureRoute(){
    return /^\/(admin|merchant)(\/|$)/i.test(location.pathname);
  }

  function hasAuthSignal(){
    try{
      var all = [document.cookie || ""];
      for(var i=0;i<localStorage.length;i++){
        var k = localStorage.key(i);
        all.push(k + "=" + (localStorage.getItem(k) || ""));
      }
      for(var j=0;j<sessionStorage.length;j++){
        var sk = sessionStorage.key(j);
        all.push(sk + "=" + (sessionStorage.getItem(sk) || ""));
      }
      return /(auth|token|jwt|session|admin|merchant|rasokart)/i.test(all.join(" "));
    }catch(e){
      return false;
    }
  }

  function canShowMaskedToken(){
    return isDocsRoute() && isSecureRoute() && hasAuthSignal();
  }

  function maskToken(token){
    if(!token || token.length <= 22) return "********";
    return token.slice(0,10) + "..." + "****" + "..." + token.slice(-6);
  }

  function closestSafeBlock(el){
    if(!el) return null;
    return el.closest("section, article, form, [class*='card'], [class*='Card'], [class*='rounded'], [class*='border'], div");
  }

  function hideSharedBearerSection(){
    if(!isDocsRoute()) return;

    var allow = canShowMaskedToken();
    var nodes = Array.prototype.slice.call(document.querySelectorAll("body *"));

    nodes.forEach(function(el){
      var txt = (el.textContent || "").trim();
      if(/Shared Bearer Token/i.test(txt)){
        var box = closestSafeBlock(el);
        if(!allow && box){
          box.classList.add("rk-token-hidden");
        }
      }
    });
  }

  function addCopyButton(parent, token){
    if(!parent || parent.querySelector(".rk-token-copy-btn")) return;

    var btn = document.createElement("button");
    btn.type = "button";
    btn.className = "rk-token-copy-btn";
    btn.textContent = "Copy Token";
    btn.addEventListener("click", function(){
      navigator.clipboard.writeText(token).then(function(){
        var old = btn.textContent;
        btn.textContent = "Copied";
        setTimeout(function(){ btn.textContent = old; }, 1200);
      }).catch(function(){
        btn.textContent = "Copy failed";
        setTimeout(function(){ btn.textContent = "Copy Token"; }, 1200);
      });
    });

    parent.appendChild(btn);
  }

  function maskVisibleTokens(){
    if(!isDocsRoute()) return;

    var allow = canShowMaskedToken();
    var walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT);
    var textNodes = [];
    var node;

    while(node = walker.nextNode()){
      if(JWT_RE.test(node.nodeValue || "")){
        textNodes.push(node);
      }
      JWT_RE.lastIndex = 0;
    }

    textNodes.forEach(function(n){
      var original = n.nodeValue || "";
      var matches = original.match(JWT_RE) || [];

      if(!allow){
        n.nodeValue = original.replace(JWT_RE, "********");
        return;
      }

      n.nodeValue = original.replace(JWT_RE, function(t){ return maskToken(t); });

      var parent = n.parentElement;
      if(parent && matches[0]){
        addCopyButton(parent, matches[0]);
      }
    });
  }

  function run(){
    hideSharedBearerSection();
    maskVisibleTokens();
  }

  if(document.readyState === "loading"){
    document.addEventListener("DOMContentLoaded", run);
  }else{
    run();
  }

  var t = null;
  new MutationObserver(function(){
    clearTimeout(t);
    t = setTimeout(run, 120);
  }).observe(document.documentElement, {childList:true, subtree:true});
})();
</script>
<!-- RASOKART_TOKEN_MASK_END -->

</body>
</html>
