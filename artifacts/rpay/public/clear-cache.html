<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clear Cache — RasoKart</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0b1120;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #131d30;
      border: 1px solid #1e3a5f;
      border-radius: 16px;
      padding: 40px 32px;
      max-width: 440px;
      width: 100%;
      text-align: center;
    }
    .logo { font-size: 22px; font-weight: 700; color: #38bdf8; margin-bottom: 24px; }
    h1 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    p { font-size: 14px; color: #94a3b8; margin-bottom: 24px; line-height: 1.6; }
    button {
      background: #0284c7;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 28px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
    }
    button:hover { background: #0369a1; }
    button:disabled { background: #334155; cursor: not-allowed; }
    .status {
      margin-top: 20px;
      font-size: 13px;
      color: #38bdf8;
      min-height: 20px;
    }
    .links { margin-top: 24px; font-size: 13px; color: #64748b; }
    .links a { color: #38bdf8; text-decoration: none; }
    .links a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">RasoKart</div>
    <h1>Clear Browser Cache</h1>
    <p>
      If the app shows a blank page or loads incorrectly after an update,
      clearing the cache will force your browser to fetch the latest version.
    </p>
    <button id="btn" onclick="clearAll()">Clear Cache &amp; Reload</button>
    <div class="status" id="status"></div>
    <div class="links">
      <a href="/admin/login">Admin Login</a>
      &nbsp;·&nbsp;
      <a href="/merchant/login">Merchant Login</a>
    </div>
  </div>

  <script>
    async function clearAll() {
      const btn = document.getElementById('btn');
      const status = document.getElementById('status');
      btn.disabled = true;
      status.textContent = 'Clearing service workers…';

      try {
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(r => r.unregister()));
        }
      } catch (e) {}

      try {
        status.textContent = 'Clearing caches…';
        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map(k => caches.delete(k)));
        }
      } catch (e) {}

      status.textContent = 'Clearing local storage…';
      try {
        const token = localStorage.getItem('rasokart_token');
        localStorage.clear();
        sessionStorage.clear();
        if (token) localStorage.setItem('rasokart_token', token);
      } catch (e) {}

      status.textContent = 'Done! Reloading…';
      setTimeout(() => {
        window.location.href = '/admin/login';
      }, 800);
    }
  </script>
</body>
</html>
