      responses:
        "200":
          description: List of saved beneficiaries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayoutBeneficiaryListResponse"
    post:
      operationId: createPayoutBeneficiary
      tags: [payout-beneficiaries]
      summary: Save a new payout beneficiary (registers with the payout provider)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PayoutBeneficiaryInput"
      responses:
        "201":
          description: Beneficiary saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayoutBeneficiary"

  /payout-beneficiaries/{id}:
    patch:
      operationId: updatePayoutBeneficiary
      tags: [payout-beneficiaries]
      summary: Edit a saved beneficiary (only allowed if never used in a successful payout)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PayoutBeneficiaryInput"
      responses:
        "200":
          description: Beneficiary updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayoutBeneficiary"

  /payout-beneficiaries/{id}/disable:
    post:
      operationId: disablePayoutBeneficiary
      tags: [payout-beneficiaries]
      summary: Disable a saved beneficiary so it can no longer be selected for new payouts
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Beneficiary disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayoutBeneficiary"

  /payout-beneficiaries/{id}/enable:
    post:
      operationId: enablePayoutBeneficiary
      tags: [payout-beneficiaries]
      summary: Re-enable a disabled beneficiary
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Beneficiary enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayoutBeneficiary"

  /payout-beneficiaries/{id}/retry-provider:
    post:
      operationId: retryPayoutBeneficiaryProvider
      tags: [payout-beneficiaries]
      summary: Retry provider registration for a beneficiary that failed to register (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Retry attempted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayoutBeneficiary"

  /api-keys:
    get:
      operationId: listApiKeys
      tags: [api-keys]
      summary: List API keys for current merchant
      responses:
        "200":
          description: List of API keys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApiKey"
    post:
      operationId: generateApiKey
      tags: [api-keys]
      summary: Generate new API key pair
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                label:
                  type: string
                  description: "Optional friendly name for this key (e.g. 'Production App')"
                  maxLength: 64
      responses:
        "201":
          description: API key created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyWithSecret"

  /api-keys/history:
    get:
      operationId: listApiKeyHistory
      tags: [api-keys]
      summary: Get credential event history for API keys
      description: Returns a list of credential events derived from the merchant's API keys (creations and revocations). Merchant access only.
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date
          description: "Filter events on or after this date (YYYY-MM-DD)"
        - name: to
          in: query
          schema:
            type: string
            format: date
          description: "Filter events on or before this date (YYYY-MM-DD)"
        - name: eventType
          in: query
          schema:
            type: string
            enum: [api_key_generated, api_key_revoked]
          description: "Filter by event type"
      responses:
        "200":
          description: List of credential events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CredentialEventList"
