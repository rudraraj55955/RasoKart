      description: Returns the outcome of the most recent orphaned-log-file cleanup, whether triggered by the nightly scheduler, the startup sweep, or an admin manually clicking "Run cleanup". Persists across server restarts and page refreshes.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Last cleanup run metadata, or hasRun=false if cleanup has never run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GithubSyncLastCleanup"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden — admin access required
          content:
