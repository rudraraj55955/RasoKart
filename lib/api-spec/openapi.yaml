      tags: [merchants]
      summary: Force-reset (clear) a merchant's callback signing secret (admin only)
      description: Clears the merchant's callback signing secret so they can re-generate it. The action is logged in the audit log. Does not return the new secret — the merchant must rotate via their own endpoint.
      parameters:
        - name: id
          in: path
          required: true
