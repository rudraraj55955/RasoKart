        "400":
          description: Log entry is not a failed delivery or has invalid id
        "401":
          description: Unauthorized
        "403":
          description: Forbidden — merchant role required
        "404":
          description: Log entry, schedule, or merchant not found
        "502":
          description: Retry failed — SMTP error

