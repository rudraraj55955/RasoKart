components:
  schemas:
    KycUploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
        size:
          type: integer
        contentType:
          type: string

    KycUploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
        objectPath:
          type: string

    KycDocument:
      type: object
      required: [id, merchantId, docType, fileUrl, status, createdAt, updatedAt]
      properties:
        id:
          type: integer
        merchantId:
          type: integer
        docType:
          type: string
        fileUrl:
          type: string
        fileName:
          type: string
          nullable: true
        status:
          type: string
        adminNote:
          type: string
          nullable: true
        reviewedBy:
          type: integer
          nullable: true
        reviewedAt:
          type: string
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string

    KycDocumentListResponse:
      type: object
      required: [data, total]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/KycDocument"
        total:
          type: integer

    KycDocumentSubmitInput:
      type: object
      required: [docType, fileUrl]
      properties:
        docType:
          type: string
        fileUrl:
          type: string
        fileName:
          type: string

    KycReviewInput:
      type: object
      required: [status]
      properties:
        status:
          type: string
        adminNote:
          type: string

    KycSummary:
      type: object
      required: [merchantId, isVerified, totalDocs, pendingCount, approvedCount, rejectedCount, requiredDocTypes, submittedDocTypes]
      properties:
        merchantId:
          type: integer
        isVerified:
          type: boolean
        totalDocs:
          type: integer
        pendingCount:
          type: integer
        approvedCount:
          type: integer
        rejectedCount:
          type: integer
        requiredDocTypes:
          type: array
          items:
            type: string
        submittedDocTypes:
          type: array
          items:
            type: string

    KycReviewHistoryEntry:
      type: object
      required: [id, kycId, reviewedBy, status, createdAt]
      properties:
        id:
          type: integer
        kycId:
          type: integer
        reviewedBy:
          type: integer
        reviewerEmail:
          type: string
          nullable: true
        reviewerName:
          type: string
          nullable: true
        status:
          type: string
        adminNote:
          type: string
          nullable: true
        createdAt:
          type: string

    KycReviewHistoryResponse:
      type: object
      required: [data, total]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/KycReviewHistoryEntry"
        total:
          type: integer

    GithubSyncConfig:
      type: object
      required: [enabled, schedule]
      properties:
        enabled:
          type: boolean
          description: Whether the GitHub sync job is enabled
        schedule:
          type: string
          description: Cron expression for the sync schedule (e.g. "0 2 * * *")

    GithubSyncStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [success, failure, never]
          description: Outcome of the last GitHub sync run, or "never" if the script has not run yet
        syncedAt:
          type: string
          format: date-time
          description: ISO timestamp of when the last sync completed
        errorMessage:
          type: string
          description: Error detail when status is "failure"
        repo:
          type: string
          description: GitHub repository that was synced

    SavedFilter:
      type: object
      required: [id, name, rawInput, filterData, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        rawInput:
          type: string
        filterData:
          type: object
          description: SmartFilter JSON object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time

    CreateSavedFilterInput:
      type: object
      required: [name, rawInput, filterData]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 40
        rawInput:
          type: string
          minLength: 1
        filterData:
          type: object
          description: SmartFilter JSON object
          additionalProperties: true

    MerchantSavedFilter:
      type: object
      required: [id, name, rawInput, filterData, context, sortOrder, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        rawInput:
          type: string
        filterData:
          type: object
          description: SmartFilter JSON object
          additionalProperties: true
        context:
          type: string
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time

    CreateMerchantSavedFilterInput:
      type: object
      required: [name, rawInput, filterData, context]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 40
        rawInput:
          type: string
          minLength: 1
        filterData:
          type: object
          description: SmartFilter JSON object
          additionalProperties: true
        context:
          type: string

    RenameMerchantSavedFilterInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 40

    ReorderMerchantSavedFiltersInput:
      type: object
      required: [ids, context]
      properties:
        ids:
          type: array
          items:
            type: integer
        context:
          type: string

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    MerchantRegisterInput:
      type: object
      required: [email, password, businessName, contactName, phone]
      properties:
        email:
          type: string
        password:
          type: string
        businessName:
          type: string
        contactName:
          type: string
        phone:
          type: string
        website:
          type: ["string", "null"]

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      required: [id, email, role, name, createdAt]
      properties:
        id:
          type: integer
        email:
          type: string
        role:
          type: string
          enum: [admin, merchant]
        name:
          type: string
        isActive:
          type: boolean
        merchantId:
          type: ["integer", "null"]
        merchantStatus:
          type: ["string", "null"]
        reconciliationAlertEmails:
          type: boolean
        planExpiryAlertEmails:
          type: boolean
        settlementStateEmails:
          type: boolean
        signatureFailureAlertEmails:
          type: boolean
        webhookFailureEmails:
          type: boolean
        apiKeyGeneratedEmails:
          type: boolean
        apiKeyRevokedEmails:
          type: boolean
        loginAlertEmails:
          type: boolean
        createdAt:
          type: string

    Merchant:
      type: object
      required: [id, businessName, contactName, email, phone, status, createdAt]
      properties:
        id:
          type: integer
        businessName:
          type: string
        contactName:
          type: string
        email:
          type: string
        phone:
          type: string
        website:
          type: ["string", "null"]
        status:
          type: string
