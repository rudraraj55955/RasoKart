        keyPrefix:
          type: ["string", "null"]
          description: Key prefix for key_generated/key_revoked events; null for secret_rotated
        occurredAt:
          type: string
          description: ISO timestamp of when the event occurred
        ipAddress:
          type: ["string", "null"]
          description: Masked IP address of the actor who performed the action
        actorEmail:
          type: ["string", "null"]
          description: Email of the actor who performed the action (admin view only)

    TrustedIp:
