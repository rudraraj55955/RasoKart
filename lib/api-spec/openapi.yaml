components:
  schemas:
    SavedFilter:
      type: object
      required: [id, name, rawInput, filterData, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        rawInput:
          type: string
        filterData:
          type: object
          description: SmartFilter JSON object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time

    CreateSavedFilterInput:
      type: object
      required: [name, rawInput, filterData]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 40
        rawInput:
          type: string
          minLength: 1
        filterData:
          type: object
          description: SmartFilter JSON object
          additionalProperties: true

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    MerchantRegisterInput:
      type: object
      required: [email, password, businessName, contactName, phone]
      properties:
        email:
          type: string
        password:
          type: string
        businessName:
          type: string
        contactName:
          type: string
        phone:
