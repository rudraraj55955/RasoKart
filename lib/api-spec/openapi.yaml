            type: integer
        - name: variant
          in: query
          required: true
          schema:
            type: string
            enum: [assigned, suspended, reinstated]
          description: Which email variant to preview
        - name: planId
          in: query
          required: false
          schema:
            type: integer
          description: Plan ID to use for the preview (defaults to merchant's current plan)
        - name: notes
          in: query
          required: false
          schema:
            type: string
          description: Optional notes to include in the preview
