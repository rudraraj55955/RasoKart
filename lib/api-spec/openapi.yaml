        X-Api-Key request header — merchantId is derived from the key automatically.
        At least one of orderId or merchantReference is required.
      properties:
        orderId:
          type: string
          description: Order ID set when the QR code was created. Takes priority over merchantReference when both are supplied.
        merchantReference:
          type: string
          description: Merchant reference set when the QR code was created. Used only when orderId is absent.
        amount:
          type: string
          description: Amount received
        transactionId:
          type: integer
          description: Internal transaction ID if available

