openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: RPay Payment Gateway API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: merchants
    description: Merchant management
  - name: transactions
    description: Transaction management
  - name: withdrawals
    description: Withdrawal requests
  - name: api-keys
    description: API key management
  - name: webhooks
    description: Webhook configuration
  - name: callbacks
    description: Callback logs
  - name: settlements
    description: Settlement reports
  - name: users
    description: User management
  - name: dashboard
    description: Dashboard statistics
  - name: products
    description: Merchant products marketplace
  - name: connections
    description: Merchant payment provider connections
  - name: plans
    description: Subscription plans
  - name: qr-codes
    description: QR code management
  - name: virtual-accounts
    description: Virtual account management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/register:
    post:
      operationId: registerMerchant
      tags: [auth]
      summary: Register merchant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MerchantRegisterInput"
      responses:
        "201":
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/chart:
    get:
      operationId: getDashboardChart
      tags: [dashboard]
      summary: Get chart data for last 30 days
      responses:
        "200":
          description: Chart data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChartDataPoint"

  /merchants:
    get:
      operationId: listMerchants
      tags: [merchants]
      summary: List merchants
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected, all]
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of merchants
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MerchantListResponse"

  /merchants/{id}:
    get:
      operationId: getMerchant
      tags: [merchants]
      summary: Get merchant by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Merchant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Merchant"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /merchants/{id}/approve:
    post:
      operationId: approveMerchant
      tags: [merchants]
      summary: Approve merchant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Merchant approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Merchant"

  /merchants/{id}/reject:
    post:
      operationId: rejectMerchant
      tags: [merchants]
      summary: Reject merchant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectInput"
      responses:
        "200":
          description: Merchant rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Merchant"

  /merchants/{id}/assign-plan:
    post:
      operationId: assignMerchantPlan
      tags: [merchants]
      summary: Assign plan to merchant (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignPlanInput"
      responses:
        "200":
          description: Plan assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MerchantPlan"

  /transactions:
    get:
      operationId: listTransactions
      tags: [transactions]
      summary: List transactions
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [deposit, withdrawal, all]
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, success, failed, all]
        - name: search
          in: query
          schema:
            type: string
        - name: merchantId
          in: query
          schema:
            type: integer
        - name: dateFrom
          in: query
          schema:
            type: string
        - name: dateTo
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of transactions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionListResponse"

  /transactions/{id}:
    get:
      operationId: getTransaction
      tags: [transactions]
      summary: Get transaction by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /transactions/search/utr:
    get:
      operationId: searchByUtr
      tags: [transactions]
      summary: Search transaction by UTR/reference number
      parameters:
        - name: utr
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Transaction found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /withdrawals:
    get:
      operationId: listWithdrawals
      tags: [withdrawals]
      summary: List withdrawal requests
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected, all]
        - name: merchantId
          in: query
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of withdrawals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WithdrawalListResponse"
    post:
      operationId: createWithdrawal
      tags: [withdrawals]
      summary: Create withdrawal request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WithdrawalInput"
      responses:
        "201":
          description: Withdrawal created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Withdrawal"

  /withdrawals/{id}/approve:
    post:
      operationId: approveWithdrawal
      tags: [withdrawals]
      summary: Approve withdrawal request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Withdrawal approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Withdrawal"

  /withdrawals/{id}/reject:
    post:
      operationId: rejectWithdrawal
      tags: [withdrawals]
      summary: Reject withdrawal request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectInput"
      responses:
        "200":
          description: Withdrawal rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Withdrawal"

  /api-keys:
    get:
      operationId: listApiKeys
      tags: [api-keys]
      summary: List API keys for current merchant
      responses:
        "200":
          description: List of API keys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApiKey"
    post:
      operationId: generateApiKey
      tags: [api-keys]
      summary: Generate new API key pair
      responses:
        "201":
          description: API key created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyWithSecret"

  /api-keys/{id}:
    delete:
      operationId: revokeApiKey
      tags: [api-keys]
      summary: Revoke API key
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: API key revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /webhooks:
    get:
      operationId: getWebhookConfig
      tags: [webhooks]
      summary: Get webhook configuration
      responses:
        "200":
          description: Webhook config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookConfig"
    put:
      operationId: updateWebhookConfig
      tags: [webhooks]
      summary: Update webhook configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookConfigInput"
      responses:
        "200":
          description: Webhook config updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookConfig"

  /callbacks:
    get:
      operationId: listCallbackLogs
      tags: [callbacks]
      summary: List callback logs
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [success, failed, all]
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of callback logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallbackLogListResponse"

  /settlements:
    get:
      operationId: listSettlements
      tags: [settlements]
      summary: List settlements
      parameters:
        - name: merchantId
          in: query
          schema:
            type: integer
        - name: dateFrom
          in: query
          schema:
            type: string
        - name: dateTo
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of settlements
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettlementListResponse"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List users (admin only)
      parameters:
        - name: role
          in: query
          schema:
            type: string
            enum: [admin, merchant, all]
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"
    post:
      operationId: createUser
      tags: [users]
      summary: Create admin user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    put:
      operationId: updateUser
      tags: [users]
      summary: Update user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /products:
    get:
      operationId: listMerchantProducts
      tags: [products]
      summary: List merchant products
      responses:
        "200":
          description: List of merchant products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MerchantProduct"

  /products/{productType}:
    put:
      operationId: toggleMerchantProduct
      tags: [products]
      summary: Enable or disable a merchant product
      parameters:
        - name: productType
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ToggleProductInput"
      responses:
        "200":
          description: Product updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MerchantProduct"

  /connections:
    get:
      operationId: listMerchantConnections
      tags: [connections]
      summary: List merchant payment provider connections
      responses:
        "200":
          description: List of connections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MerchantConnection"
    post:
      operationId: createMerchantConnection
      tags: [connections]
      summary: Create or update a provider connection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MerchantConnectionInput"
      responses:
        "200":
          description: Connection saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MerchantConnection"

  /connections/{id}:
    put:
      operationId: updateMerchantConnection
      tags: [connections]
      summary: Update a provider connection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MerchantConnectionInput"
      responses:
        "200":
          description: Connection updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MerchantConnection"
    delete:
      operationId: deleteMerchantConnection
      tags: [connections]
      summary: Delete a provider connection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Connection deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /plans/me:
    get:
      operationId: getMyPlan
      tags: [plans]
      summary: Get current merchant's assigned plan
      responses:
        "200":
          description: Merchant plan assignment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MerchantPlanWithDetails"
        "404":
          description: No plan assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /plans:
    get:
      operationId: listPlans
      tags: [plans]
      summary: List all plans
      responses:
        "200":
          description: List of plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Plan"
    post:
      operationId: createPlan
      tags: [plans]
      summary: Create a plan (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlanInput"
      responses:
        "201":
          description: Plan created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Plan"

  /plans/{id}:
    put:
      operationId: updatePlan
      tags: [plans]
      summary: Update a plan (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlanInput"
      responses:
        "200":
          description: Plan updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Plan"
    delete:
      operationId: deletePlan
      tags: [plans]
      summary: Delete a plan (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Plan deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /qr-codes:
    get:
      operationId: listQrCodes
      tags: [qr-codes]
      summary: List QR codes
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [static, dynamic, all]
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive, all]
        - name: search
          in: query
          schema:
            type: string
        - name: merchantId
          in: query
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of QR codes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QrCodeListResponse"
    post:
      operationId: createQrCode
      tags: [qr-codes]
      summary: Create QR code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QrCodeInput"
      responses:
        "201":
          description: QR code created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QrCode"

  /qr-codes/{id}:
    put:
      operationId: updateQrCode
      tags: [qr-codes]
      summary: Update QR code status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QrCodeUpdateInput"
      responses:
        "200":
          description: QR code updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QrCode"
    delete:
      operationId: deleteQrCode
      tags: [qr-codes]
      summary: Delete QR code
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: QR code deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /virtual-accounts:
    get:
      operationId: listVirtualAccounts
      tags: [virtual-accounts]
      summary: List virtual accounts
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, closed, all]
        - name: search
          in: query
          schema:
            type: string
        - name: merchantId
          in: query
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of virtual accounts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualAccountListResponse"
    post:
      operationId: createVirtualAccount
      tags: [virtual-accounts]
      summary: Create virtual account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VirtualAccountInput"
      responses:
        "201":
          description: Virtual account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualAccount"

  /virtual-accounts/{id}/transactions:
    get:
      operationId: getVirtualAccountTransactions
      tags: [virtual-accounts]
      summary: Get transaction history for a virtual account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Transaction history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaTransactionListResponse"

  /virtual-accounts/{id}:
    put:
      operationId: updateVirtualAccount
      tags: [virtual-accounts]
      summary: Update virtual account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VirtualAccountUpdateInput"
      responses:
        "200":
          description: Virtual account updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualAccount"
    delete:
      operationId: deleteVirtualAccount
      tags: [virtual-accounts]
      summary: Delete / close virtual account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Virtual account closed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /api-monitoring:
    get:
      operationId: getApiMonitoringStats
      tags: [dashboard]
      summary: Get API monitoring statistics
      responses:
        "200":
          description: API monitoring stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMonitoringStats"

  /audit-logs:
    get:
      operationId: listAdminAuditLogs
      tags: [dashboard]
      summary: List admin audit logs
      parameters:
        - name: page
          in: query
          schema: { type: integer }
        - name: limit
          in: query
          schema: { type: integer }
        - name: action
          in: query
          schema: { type: string }
        - name: search
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Audit log list
          content:
            application/json:
              schema:
