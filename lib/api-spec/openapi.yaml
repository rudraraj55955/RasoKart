          schema:
            type: integer
      responses:
        "200":
          description: Re-registration attempted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReregisterBeneficiaryResponse"

  /withdrawals/{id}/repair-beneficiary-mapping:
    post:
      operationId: repairWithdrawalBeneficiaryMapping
      tags: [withdrawals]
      summary: "Non-destructive repair: find the beneficiary on the provider side (by providerBeneficiaryId or by bank account+IFSC) and sync back to local row. Never creates a new beneficiary — read-only towards the provider, write to local DB only on a confirmed match (admin only)."
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Repair result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepairBeneficiaryMappingResponse"

  /withdrawals/{id}/beneficiary-status:
    post:
      operationId: checkWithdrawalBeneficiaryStatus
      tags: [withdrawals]
      summary: Read-only check of the payout's beneficiary status directly with the provider (admin only). Never creates or mutates the beneficiary.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Current beneficiary status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BeneficiaryStatusCheckResponse"

  /payout-beneficiaries:
    get:
      operationId: listPayoutBeneficiaries
