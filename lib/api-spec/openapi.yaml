        - name: limit
          in: query
          schema: { type: integer }
        - name: action
          in: query
          schema: { type: string }
        - name: targetType
          in: query
          description: "Filter logs by target entity type (e.g. merchant, plan, user, account_detail)"
          schema: { type: string }
        - name: search
          in: query
          schema: { type: string }
        - name: dateFrom
          in: query
          description: "Filter logs on or after this date (ISO 8601, e.g. 2025-01-01)"
          schema: { type: string, format: date }
        - name: dateTo
          in: query
          description: "Filter logs on or before this date (ISO 8601, e.g. 2025-12-31)"
          schema: { type: string, format: date }
