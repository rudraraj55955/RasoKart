      required: [data, stats]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ReportSettlement"
        stats:
          type: object
          required: [totalAmount, paidAmount, pendingAmount, rejectedAmount, paidCount, pendingCount, processingCount, rejectedCount, totalCount]
          properties:
            totalAmount:
              type: number
            paidAmount:
              type: number
            pendingAmount:
              type: number
            rejectedAmount:
              type: number
            paidCount:
              type: integer
            pendingCount:
              type: integer
            processingCount:
              type: integer
            rejectedCount:
              type: integer
            totalCount:
              type: integer

    AdminReportSchedule:
      type: object
      required: [id, merchantId, businessName, merchantEmail, frequency, format, isActive, consecutiveFailures, autoPauseAfterFailures, sevenDayTotal, sevenDaySuccesses, createdAt, updatedAt]
      properties:
        id:
          type: integer
        merchantId:
          type: integer
        businessName:
          type: string
        merchantEmail:
          type: string
        frequency:
          type: string
          enum: [weekly, monthly]
        format:
          type: string
          enum: [xlsx, pdf]
        isActive:
          type: boolean
        consecutiveFailures:
          type: integer
          description: Number of consecutive delivery failures. Non-zero when auto-paused.
        autoPauseAfterFailures:
          type: integer
          description: Threshold of consecutive failures before auto-pausing the schedule.
        dayOfWeek:
          type: ["integer", "null"]
          minimum: 0
          maximum: 6
          description: Day of week for weekly reports (0=Sun, 1=Mon, …, 6=Sat). Null uses rolling 7-day cadence.
        dayOfMonth:
          type: ["integer", "null"]
          minimum: 1
          maximum: 28
          description: Day of month for monthly reports (1–28). Null uses rolling 30-day cadence.
        lastSentAt:
          type: ["string", "null"]
          description: ISO timestamp of last successful send
        nextRunAt:
          type: ["string", "null"]
          description: Admin-set override for the next scheduled run. Cleared automatically after the report fires.
        lastDeliveryAt:
          type: ["string", "null"]
          description: ISO timestamp of the most recent delivery attempt (success or failure). Null if no attempts exist.
        lastDeliverySuccess:
          type: ["boolean", "null"]
          description: Whether the most recent delivery attempt succeeded. Null if no attempts exist.
        lastDeliveryLogId:
          type: ["integer", "null"]
          description: ID of the most recent delivery log entry. Enables inline retry of failed deliveries.
        sevenDayTotal:
          type: integer
          description: Total delivery attempts in the last 7 days.
        sevenDaySuccesses:
          type: integer
          description: Successful delivery attempts in the last 7 days.
        createdAt:
          type: string
        updatedAt:
          type: string
        recentFailures:
          type: array
          description: Last 3 delivery failure log entries for auto-paused schedules. Empty for active or manually-paused schedules.
          items:
            $ref: "#/components/schemas/ReportDeliveryLog"

    TransactionReportResponse:
      type: object
      required: [data, stats]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ReportTransaction"
        stats:
          type: object
          required: [depositVolume, withdrawalVolume, successCount, failedCount, pendingCount, totalFees]
          properties:
            depositVolume:
              type: number
            withdrawalVolume:
              type: number
            successCount:
              type: integer
            failedCount:
              type: integer
            pendingCount:
              type: integer
            totalFees:
              type: number
              description: Sum of all fees across matched transactions

    Withdrawal:
      type: object
      required: [id, merchantId, amount, currency, status, transferStatus, payoutMode, bankAccount, bankName, ifscCode, accountHolder, createdAt]
      properties:
        id:
          type: integer
        merchantId:
          type: integer
        merchantName:
          type: ["string", "null"]
        amount:
          type: number
        currency:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected]
        transferStatus:
          type: string
          enum: [NOT_STARTED, INITIATED, PENDING, SUCCESS, FAILED, REVERSED]
        utr:
          type: ["string", "null"]
        failureReason:
          type: ["string", "null"]
        payoutMode:
          type: string
          enum: [IMPS, NEFT, RTGS, UPI]
        upiId:
          type: ["string", "null"]
        remarks:
          type: ["string", "null"]
        bankAccount:
          type: string
        bankName:
          type: string
        ifscCode:
          type: string
        accountHolder:
          type: string
        beneficiaryId:
          type: ["integer", "null"]
          description: Saved beneficiary used for this payout (never exposes provider IDs)
        beneficiaryStatus:
          type: string
          enum: [NOT_REGISTERED, VERIFIED, NOT_VERIFIED, FAILED]
          description: Current beneficiary verification state — Retry is only enabled when this is VERIFIED
        safeFailureReason:
          type: ["string", "null"]
          description: Sanitized, generic failure reason — admin sees a safe internal reason, merchant sees only a generic support message; never a raw provider response
        hasProviderReference:
          type: ["boolean", "null"]
          description: Admin-only — true when a provider reference ID exists, meaning the payout reached the provider and may have succeeded even if local status is FAILED. Retry is blocked while this is true.
        rejectionReason:
          type: ["string", "null"]
        rejectedAt:
          type: ["string", "null"]
          description: "ISO timestamp when admin rejected the payout (admin-only)"
        rejectedByAdminId:
          type: ["integer", "null"]
          description: "Admin user ID who rejected the payout (admin-only)"
        approvedAt:
          type: ["string", "null"]
        completedAt:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    WithdrawalInput:
      type: object
      required: [amount]
      properties:
        amount:
          type: number
        beneficiaryId:
          type: integer
          description: Use a saved beneficiary instead of raw bank/UPI fields below
        payoutMode:
          type: string
          enum: [IMPS, NEFT, RTGS, UPI]
          description: "Payout mode (alias: mode)"
        mode:
          type: string
          enum: [IMPS, NEFT, RTGS, UPI]
          description: Alias for payoutMode
        accountNumber:
          type: string
          description: "Bank account number (alias: bankAccount, account_number)"
        bankName:
          type: string
        ifscCode:
          type: string
        accountHolderName:
          type: string
          description: "Account holder name (alias: accountHolder, account_holder_name)"
        upiId:
          type: string
        remarks:
          type: string

    RepairBeneficiaryMappingResponse:
      type: object
      required: [ok, foundOnProvider, beneficiaryStatus]
      properties:
        ok:
          type: boolean
          description: True if a verified beneficiary was found on the provider and local row was updated
        foundOnProvider:
          type: boolean
          description: True if the provider returned a matching beneficiary for this account
        providerBeneficiaryId:
          type: ["string", "null"]
          description: The provider-assigned beneficiary id found on the provider side (may differ from the locally generated id)
        beneficiaryStatus:
          type: string
          enum: [NOT_REGISTERED, VERIFIED, NOT_VERIFIED, FAILED]
        message:
          type: ["string", "null"]
          description: "provider_beneficiary_missing when not found; otherwise null on success"

    ReregisterBeneficiaryResponse:
      type: object
      required: [success, providerStatus]
      properties:
        success:
          type: boolean
        providerStatus:
          type: string
          enum: [not_created, created, failed, stale]
        beneficiaryStatus:
          type: string
          enum: [NOT_REGISTERED, VERIFIED, NOT_VERIFIED, FAILED]
          description: Only set to VERIFIED after the provider has confirmed the beneficiary via a follow-up status check
        message:
          type: ["string", "null"]
          description: Safe, admin-facing message only — never raw provider response

    BeneficiaryStatusCheckResponse:
      type: object
      required: [beneficiaryId, providerStatus, beneficiaryStatus, checkedAt]
      properties:
        beneficiaryId:
          type: integer
        providerStatus:
          type: string
          enum: [not_created, created, failed, stale]
        beneficiaryStatus:
          type: string
          enum: [NOT_REGISTERED, VERIFIED, NOT_VERIFIED, FAILED]
        checkedAt:
          type: string

    PayoutBeneficiary:
      type: object
      required: [id, merchantId, payoutMode, localStatus, providerStatus, createdAt, updatedAt]
      properties:
        id:
          type: integer
        merchantId:
          type: integer
        merchantName:
          type: ["string", "null"]
        label:
          type: ["string", "null"]
        payoutMode:
          type: string
          enum: [IMPS, NEFT, RTGS, UPI]
        bankName:
          type: ["string", "null"]
        bankAccountLast4:
          type: ["string", "null"]
          description: Last 4 digits of bank account only — full number never exposed
        ifscCode:
          type: ["string", "null"]
        accountHolder:
          type: ["string", "null"]
        upiIdMasked:
          type: ["string", "null"]
          description: Masked UPI VPA (e.g. me***@upi) — raw VPA is not re-exposed after creation
        localStatus:
          type: string
          enum: [active, disabled]
        providerStatus:
          type: string
          enum: [not_created, created, failed, stale]
          description: "stale = provider previously reported this beneficiary id as invalid/not found; will be re-registered on next attempt"
        beneficiaryStatus:
          type: string
          enum: [NOT_REGISTERED, VERIFIED, NOT_VERIFIED, FAILED]
          description: Normalized beneficiary verification state derived from providerStatus
        lastProviderError:
          type: ["string", "null"]
          description: Safe, admin-facing error message only — never raw provider response
        usedInSuccessfulPayout:
          type: boolean
          description: True once a SUCCESS withdrawal has used this beneficiary — blocks direct edits
        createdAt:
          type: string
        updatedAt:
          type: string

    PayoutBeneficiaryListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/PayoutBeneficiary"

    PayoutBeneficiaryInput:
      type: object
      required: [payoutMode]
      properties:
        label:
          type: string
        payoutMode:
          type: string
          enum: [IMPS, NEFT, RTGS, UPI]
        accountNumber:
          type: string
        bankName:
          type: string
        ifscCode:
          type: string
        accountHolderName:
          type: string
        upiId:
          type: string

    WithdrawalListResponse:
      type: object
      required: [data, total, page, limit, stats]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Withdrawal"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        stats:
          type: object
          required: [totalVolume, pendingCount, approvedCount, rejectedCount, processingCount, successCount, failedCount, lockedAmount]
          properties:
            totalVolume:
              type: number
            pendingCount:
              type: integer
            approvedCount:
              type: integer
            rejectedCount:
              type: integer
            processingCount:
              type: integer
            successCount:
              type: integer
            failedCount:
              type: integer
            lockedAmount:
              type: number

    ApiKey:
      type: object
      required: [id, merchantId, keyPrefix, isActive, createdAt]
      properties:
        id:
          type: integer
        merchantId:
          type: integer
        keyPrefix:
          type: string
        label:
          type: ["string", "null"]
        isActive:
          type: boolean
        lastUsedAt:
          type: ["string", "null"]
        createdAt:
          type: string

    ApiKeyWithSecret:
      type: object
      required: [id, merchantId, apiKey, secretKey, keyPrefix, isActive, createdAt]
      properties:
        id:
          type: integer
        merchantId:
          type: integer
        apiKey:
          type: string
        secretKey:
          type: string
        keyPrefix:
          type: string
        label:
          type: ["string", "null"]
        isActive:
          type: boolean
        createdAt:
          type: string

    WebhookConfig:
      type: object
      required: [id, merchantId, url, isActive, events, maxRetries, failureAlertEnabled, failureAlertThreshold, globalMaxRetries]
      properties:
        id:
          type: integer
        merchantId:
          type: integer
        url:
          type: string
        isActive:
          type: boolean
        events:
          type: array
          items:
            type: string
        secret:
          type: ["string", "null"]
        maxRetries:
          type: integer
          minimum: 0
          maximum: 10
          description: Maximum number of automatic retries for failed deliveries (0 = no retries, default 3)
        globalMaxRetries:
          type: integer
          minimum: 0
          description: The admin-configured global cap on retries (maxAttempts - 1). The per-webhook maxRetries cannot exceed this value.
        retryDelay1:
          type: ["integer", "null"]
          description: Delay in seconds before the 1st retry. Null means use the system default.
        retryDelay2:
          type: ["integer", "null"]
          description: Delay in seconds before the 2nd retry. Null means use the system default.
        retryDelay3:
          type: ["integer", "null"]
          description: Delay in seconds before the 3rd and subsequent retries. Null means use the system default.
        failureAlertEnabled:
          type: boolean
          description: Whether to send an email alert when consecutive failures reach the threshold
        failureAlertThreshold:
          type: integer
          minimum: 1
          maximum: 10
          description: Number of consecutive delivery failures that triggers an email alert (default 3)
        createdAt:
          type: string

    WebhookTestRequest:
      type: object
      properties:
        eventType:
          type: string
          enum:
            - payment.success
            - payment.failed
            - payment.pending
            - withdrawal.approved
            - withdrawal.rejected
            - settlement.processed
          description: The event type to use for the test payload. Defaults to `payment.success`.

    WebhookTestResult:
      type: object
      required: [delivered, httpStatus, responseBody, durationMs, targetUrl, signed]
      properties:
        delivered:
          type: boolean
          description: True if the remote server responded with 2xx
        httpStatus:
          type: ["integer", "null"]
          description: HTTP status code returned by the remote endpoint, or null if the request failed to connect
        responseBody:
          type: ["string", "null"]
          description: First 500 characters of the response body, or null if no response body
        durationMs:
          type: integer
          description: Round-trip time in milliseconds
        targetUrl:
          type: string
          description: The URL the test event was sent to
        signed:
          type: boolean
          description: Whether the test payload was signed with the webhook secret
        signatureHeader:
          type: string
          description: The exact value of the X-Signature header sent with the test request (only present when signed=true)
        requestBody:
          type: string
          description: The exact JSON string that was sent as the request body (useful for reproducing HMAC verification)

    WebhookConfigInput:
      type: object
      required: [url, events]
      properties:
        url:
          type: string
        isActive:
          type: boolean
        events:
          type: array
          items:
            type: string
        secret:
          type: ["string", "null"]
        maxRetries:
          type: integer
          minimum: 0
          maximum: 10
          description: Maximum number of automatic retries for failed deliveries (0 = no retries, default 3)
        retryDelay1:
          type: ["integer", "null"]
          description: Delay in seconds before the 1st retry. Null means use the system default.
        retryDelay2:
          type: ["integer", "null"]
          description: Delay in seconds before the 2nd retry. Null means use the system default.
        retryDelay3:
          type: ["integer", "null"]
          description: Delay in seconds before the 3rd and subsequent retries. Null means use the system default.
        failureAlertEnabled:
          type: boolean
          description: Whether to send an email alert when consecutive failures reach the threshold
        failureAlertThreshold:
          type: integer
          minimum: 1
          maximum: 10
          description: Number of consecutive delivery failures that triggers an email alert (default 3)

    CallbackSecretStatus:
      type: object
      required: [isSet]
      properties:
        isSet:
          type: boolean
          description: Whether a callback signing secret has been configured
        secretPrefix:
          type: ["string", "null"]
          description: First 8 characters of the secret followed by "..." — null when no secret is set
        lastRotatedAt:
          type: ["string", "null"]
          format: date-time
          description: ISO timestamp of when the secret was last rotated (or first set). Null if no secret has ever been set.

    MerchantListCredentialEvent:
