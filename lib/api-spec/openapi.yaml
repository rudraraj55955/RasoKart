openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: RasoKart Payment Gateway API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: merchants
    description: Merchant management
  - name: transactions
    description: Transaction management
  - name: withdrawals
    description: Withdrawal requests
  - name: api-keys
    description: API key management
  - name: webhooks
    description: Webhook configuration
  - name: callbacks
    description: Callback logs
  - name: settlements
    description: Settlement reports
  - name: users
    description: User management
  - name: dashboard
    description: Dashboard statistics
  - name: products
    description: Merchant products marketplace
  - name: connections
    description: Merchant payment provider connections
  - name: plans
    description: Subscription plans
  - name: qr-codes
    description: QR code management
  - name: virtual-accounts
    description: Virtual account management
  - name: feature-control
    description: Merchant feature toggles
  - name: account-details
    description: Admin-managed payment collection accounts
  - name: invoices
    description: Merchant subscription invoices
  - name: ledger
    description: Merchant balance ledger entries
  - name: providers
    description: Payment provider catalogue and visibility control
  - name: notifications
    description: In-app notification centre for merchants and admins
  - name: reconciliation
    description: Deposit-to-settlement reconciliation engine
  - name: payment-links
    description: Shareable payment link management
  - name: system-config
    description: System-wide configuration settings for admins
  - name: storage
    description: Object storage upload and serving endpoints
  - name: saved-filters
    description: Admin-scoped saved smart search filter presets
  - name: github-sync
    description: GitHub repository sync status
  - name: security
    description: Merchant security event log
  - name: kyc
    description: KYC document verification for merchants
  - name: reports
    description: Transaction report generation for merchants and admins
  - name: support
    description: Merchant support ticket system
  - name: verification
    description: Merchant KYC/AML verification application system
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/register:
    post:
      operationId: registerMerchant
      tags: [auth]
      summary: Register merchant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MerchantRegisterInput"
      responses:
        "201":
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/preferences:
    put:
      operationId: updateMyPreferences
      tags: [auth]
      summary: Update current user preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reconciliationAlertEmails:
                  type: boolean
                planExpiryAlertEmails:
                  type: boolean
                settlementStateEmails:
                  type: boolean
                signatureFailureAlertEmails:
                  type: boolean
                webhookFailureEmails:
                  type: boolean
                apiKeyGeneratedEmails:
                  type: boolean
                apiKeyRevokedEmails:
                  type: boolean
                loginAlertEmails:
                  type: boolean
      responses:
        "200":
          description: Updated preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/trusted-ips:
    get:
      operationId: listTrustedIps
      tags: [auth]
      summary: List trusted IP addresses
      description: Returns all trusted IP addresses for the authenticated merchant user.
      responses:
        "200":
          description: List of trusted IPs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrustedIpListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Merchant access only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/trusted-ips/{id}:
    delete:
      operationId: deleteTrustedIp
      tags: [auth]
      summary: Remove a trusted IP address
      description: Removes a trusted IP so login alerts will resume from that IP.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Trusted IP removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/chart:
    get:
      operationId: getDashboardChart
      tags: [dashboard]
      summary: Get chart data for last 30 days
      responses:
        "200":
          description: Chart data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChartDataPoint"

  /merchants:
    get:
      operationId: listMerchants
      tags: [merchants]
      summary: List merchants
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected, all]
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: expiryStatus
          in: query
          schema:
            type: string
            enum: [expiring, expired]
        - name: rejectionReason
          in: query
          schema:
            type: string
        - name: callbackSecretSet
          in: query
          description: Filter by whether merchants have a callback secret configured. "true" = secret set, "false" = no secret.
          schema:
            type: string
            enum: ["true", "false"]
        - name: loginAlertEmails
          in: query
          description: Filter by login alert email preference. "false" = alerts disabled, "true" = alerts enabled.
          schema:
            type: string
            enum: ["true", "false"]
        - name: securityEmailsDisabled
          in: query
          description: When "true", return only merchants who have at least one security email alert disabled (signature failure, webhook failure, API key generated, or API key revoked).
          schema:
            type: string
            enum: ["true"]
      responses:
        "200":
          description: List of merchants
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MerchantListResponse"

  /merchants/{id}:
    get:
      operationId: getMerchant
      tags: [merchants]
      summary: Get merchant by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Merchant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Merchant"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /merchants/{id}/plan:
    get:
      operationId: getMerchantPlan
      tags: [merchants]
      summary: Get current plan assignment for a merchant (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Merchant plan assignment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MerchantPlanWithDetails"
        "404":
          description: No plan assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /merchants/{id}/approve:
    post:
      operationId: approveMerchant
      tags: [merchants]
      summary: Approve merchant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Merchant approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Merchant"

  /merchants/{id}/reject:
    post:
      operationId: rejectMerchant
      tags: [merchants]
      summary: Reject merchant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectInput"
      responses:
        "200":
          description: Merchant rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Merchant"

  /merchants/{id}/suspend:
    post:
      operationId: suspendMerchant
      tags: [merchants]
      summary: Suspend merchant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Merchant suspended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Merchant"

  /merchants/{id}/unsuspend:
    post:
      operationId: unsuspendMerchant
      tags: [merchants]
      summary: Unsuspend merchant (restore to approved)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Merchant unsuspended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Merchant"

  /merchants/{id}/plan/usage:
    get:
      operationId: getMerchantPlanUsageAdmin
      tags: [merchants]
      summary: Get QR and resource usage for a merchant (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Merchant plan usage
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanUsage"
        "404":
          description: No plan assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /merchants/{id}/plan/history:
    get:
      operationId: getMerchantPlanHistory
      tags: [merchants]
      summary: Get plan history for a merchant (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Plan history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlanHistory"

  /merchants/bulk-reject:
    post:
      operationId: bulkRejectMerchants
      tags: [merchants]
      summary: Bulk-reject multiple pending merchants (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkRejectInput"
      responses:
        "200":
          description: Merchants rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkMerchantActionResult"

  /merchants/bulk-approve:
    post:
      operationId: bulkApproveMerchants
      tags: [merchants]
      summary: Bulk-approve multiple merchants (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkMerchantActionInput"
      responses:
        "200":
          description: Merchants approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkMerchantActionResult"

  /merchants/bulk-suspend:
    post:
      operationId: bulkSuspendMerchants
      tags: [merchants]
      summary: Bulk-suspend or reinstate multiple merchants (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkSuspendInput"
      responses:
        "200":
          description: Merchants suspended or reinstated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkMerchantActionResult"

  /merchants/bulk-assign-plan:
    post:
      operationId: bulkAssignMerchantPlan
      tags: [merchants]
      summary: Bulk-assign a plan to multiple merchants (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkAssignPlanInput"
      responses:
        "200":
          description: Plans assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkMerchantActionResult"

  /merchants/bulk-unassign-plan:
    post:
      operationId: bulkUnassignMerchantPlan
      tags: [merchants]
      summary: Bulk-remove plan assignment from multiple merchants (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkMerchantActionInput"
      responses:
        "200":
          description: Plans unassigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkMerchantActionResult"

  /merchants/webhook-failure-counts:
    get:
      operationId: getMerchantsWebhookFailureCounts
      tags: [merchants]
      summary: Get webhook failure alert counts per merchant (admin only)
      parameters:
        - name: merchantIds
          in: query
          required: true
          schema:
            type: string
          description: Comma-separated list of merchant IDs to fetch counts for
      responses:
        "200":
          description: Webhook failure alert counts keyed by merchant ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MerchantWebhookFailureCountsResponse"

  /merchants/{id}/assign-plan:
    post:
      operationId: assignMerchantPlan
      tags: [merchants]
      summary: Assign plan to merchant (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignPlanInput"
      responses:
        "200":
          description: Plan assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MerchantPlan"

  /merchants/{id}/plan/upgrade:
    post:
      operationId: upgradeMerchantPlan
      tags: [merchants]
      summary: Upgrade merchant to a higher plan (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlanActionInput"
      responses:
        "200":
          description: Plan upgraded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MerchantPlan"

  /merchants/{id}/plan/downgrade:
    post:
      operationId: downgradeMerchantPlan
      tags: [merchants]
      summary: Downgrade merchant to a lower plan (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlanActionInput"
      responses:
        "200":
          description: Plan downgraded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MerchantPlan"

  /merchants/{id}/plan/suspend:
    post:
      operationId: suspendMerchantPlan
      tags: [merchants]
      summary: Suspend a merchant's plan (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlanNoteInput"
      responses:
        "200":
          description: Plan suspended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MerchantPlan"

  /merchants/{id}/plan/reinstate:
    post:
      operationId: reinstateMerchantPlan
      tags: [merchants]
      summary: Reinstate a suspended merchant plan (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlanNoteInput"
      responses:
        "200":
          description: Plan reinstated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MerchantPlan"

  /merchants/{id}/plan/renew:
    post:
      operationId: renewMerchantPlan
      tags: [merchants]
      summary: Renew a merchant's plan (extend expiry) (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenewPlanInput"
      responses:
        "200":
          description: Plan renewed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MerchantPlan"

  /merchants/{id}/plan/schedule-renewal:
    post:
      operationId: scheduleMerchantPlanRenewal
      tags: [merchants]
      summary: Set or cancel a scheduled auto-renewal date for a merchant's plan (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScheduleRenewalInput"
      responses:
        "200":
          description: Scheduled renewal updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MerchantPlan"

  /merchants/{id}/branding:
    patch:
      operationId: updateMerchantBranding
      tags: [merchants]
      summary: Update merchant branding (logo URL and brand colour). Merchant updates own; admin can update any.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MerchantBrandingInput"
      responses:
        "200":
          description: Updated merchant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Merchant"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /merchants/{id}/callback-secret:
    get:
      operationId: getAdminMerchantCallbackSecret
      tags: [merchants]
      summary: Get callback signing secret status for a merchant (admin only)
      description: Returns whether the merchant has a callback signing secret configured, plus a masked prefix. Never returns the raw secret value.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Callback secret status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallbackSecretStatus"
        "403":
          description: Admin access only
        "404":
          description: Merchant not found
    delete:
      operationId: resetAdminMerchantCallbackSecret
      tags: [merchants]
      summary: Force-reset (clear) a merchant's callback signing secret (admin only)
      description: Clears the merchant's callback signing secret so they can re-generate it. The action is logged in the audit log. Does not return the new secret — the merchant must rotate via their own endpoint.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Secret cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallbackSecretStatus"
        "403":
          description: Admin access only
        "404":
          description: Merchant not found

  /merchants/{id}/callback-window:
    patch:
      operationId: updateMerchantCallbackWindow
      tags: [merchants]
      summary: Update the per-merchant replay-protection timestamp window (admin only)
      description: Sets the number of seconds around the current time that an inbound callback X-Timestamp is considered valid. Pass null to reset to the global default (300 s).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CallbackWindowInput"
      responses:
        "200":
          description: Updated merchant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Merchant"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Admin access only
        "404":
          description: Merchant not found

  /merchants/{id}/webhook-config:
    get:
      operationId: getAdminMerchantWebhookConfig
      tags: [merchants]
      summary: Get webhook configuration for a merchant (admin only)
      description: Returns the webhook configuration row for a merchant, including the current maxRetries setting.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Merchant webhook configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookConfig"
        "403":
          description: Admin access only
        "404":
          description: Merchant or webhook config not found

  /merchants/{id}/webhook-max-retries:
    patch:
      operationId: updateMerchantWebhookMaxRetries
      tags: [merchants]
      summary: Update per-merchant webhook max-retry limit (admin only)
      description: Sets the maximum number of automatic delivery retries for a merchant's webhook (1–10).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MerchantWebhookMaxRetriesInput"
      responses:
        "200":
          description: Updated webhook configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookConfig"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Admin access only
        "404":
          description: Merchant or webhook config not found
        "422":
          description: Value exceeds the global retry cap
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /merchants/{id}/credential-events:
    get:
      operationId: listMerchantCredentialEvents
      tags: [merchants]
      summary: List credential events for a merchant (admin only)
      description: Returns key_generated, key_revoked, and secret_rotated events for a merchant, newest first. Optionally filter by eventType.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: eventType
          in: query
          required: false
          schema:
            type: string
            enum: [key_generated, key_revoked, secret_rotated]
      responses:
        "200":
          description: Credential event list
          content:
