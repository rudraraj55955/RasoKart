  /smart-routing/simulate:
    get:
      summary: Dry-run the failover chain for a given amount and payment mode (admin)
      description: >-
        Dry-runs the routing engine for a given amount and payment mode without making any
        real gateway calls or writing routing logs. Also suitable for automated CI/CD checks:
        the response includes a top-level `wouldFail` boolean that is `true` when the config
        change under test would leave zero viable providers for the given amount/payment mode
        (either no matching rules, or every matching rule is Fallback Only). Example for a
        pipeline check:

        ```
        curl -s -H "Authorization: Bearer $ADMIN_TOKEN" \
          "$API_BASE/api/smart-routing/simulate?amount=1000&paymentMode=upi" \
          | jq -e '.wouldFail == false'
        ```

        A non-zero exit code from `jq -e` (i.e. `wouldFail` is `true`) can be wired to fail the
        pipeline before a bad routing config reaches production.
      operationId: simulateRouting
      tags: [SmartRouting]
      security:
        - bearerAuth: []
      parameters:
        - name: amount
          in: query
          required: true
          schema:
            type: number
          description: Payment amount to simulate routing for
        - name: paymentMode
          in: query
          required: false
          schema:
            type: string
          description: Payment mode (upi, card, netbanking, wallet, bnpl, emi)
        - name: configName
          in: query
          required: false
          schema:
            type: string
          description: Name of the routing config to simulate (defaults to first enabled config)
      responses:
        "200":
          description: Ordered list of providers that would be attempted (no real calls made)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimulateRoutingResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No enabled routing config found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
