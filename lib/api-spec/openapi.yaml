        recipients: { type: string }
        status: { type: string }
        errorMessage:
          type: string
          nullable: true
        sentAt:
          type: string
          format: date-time

    ExpiryCheckResult:
      type: object
      required: [message, notificationsSent, expiringCount, expiredCount]
      properties:
        message: { type: string }
        notificationsSent: { type: integer }
        expiringCount: { type: integer }
        expiredCount: { type: integer }

    ReconciliationNextRun:
      type: object
      required: [nextRunAt]
      properties:
        nextRunAt:
          type: string
          nullable: true
          description: ISO timestamp of the next scheduled reconciliation run
        serverTimezone:
          type: string
          nullable: true
          description: IANA timezone name of the server (e.g. "America/New_York") used to interpret scheduled hour/minute

    ReconciliationScheduleConfig:
      type: object
      required: [hour, minute, lookbackDays, enabled]
      properties:
        hour:
          type: integer
          minimum: 0
          maximum: 23
          description: Hour of day (0-23) to run the scheduled reconciliation
        minute:
          type: integer
          minimum: 0
          maximum: 59
          description: Minute of the hour (0-59) to run the scheduled reconciliation
        lookbackDays:
          type: integer
          minimum: 1
          maximum: 90
          description: Number of days to look back when running the scheduled reconciliation
        enabled:
          type: boolean
          description: Whether the scheduled auto-reconciliation is enabled

    WebhookRetryDelay:
      type: object
      required: [attempt, delaySeconds, label]
      properties:
        attempt:
          type: integer
          description: The attempt number after which this delay applies (1-indexed).
        delaySeconds:
          type: integer
          description: Delay in seconds before the next retry.
        label:
          type: string
          description: Human-readable delay label, e.g. "30s", "5m", "30m".

    WebhookRetryPolicy:
      type: object
      required: [maxAttempts, initialAttempt, retries, delays]
      properties:
        maxAttempts:
          type: integer
          description: Total maximum delivery attempts (initial + retries).
        initialAttempt:
          type: integer
          description: Always 1 — represents the first delivery attempt.
        retries:
          type: integer
          description: Number of automatic retries after the initial attempt.
        delays:
          type: array
          items:
            $ref: "#/components/schemas/WebhookRetryDelay"
          description: Per-attempt delay schedule. Entry N gives the wait before attempt N+1.

    AuditReportRetentionConfig:
      type: object
      required: [retentionDays]
      properties:
        retentionDays:
          type: integer
          minimum: 0
          maximum: 3650
          description: >
            Days to retain scheduled audit report delivery logs before auto-deleting them.
            Set to 0 to disable automatic cleanup.

    AuditReportRetentionRunResult:
      type: object
      required: [deleted]
      properties:
        deleted:
          type: integer
          description: Number of audit report log rows deleted by this cleanup run.

    CleanupJobStats:
      type: object
      required: []
      properties:
        lastRunAt:
          type: string
          format: date-time
          nullable: true
          description: ISO timestamp of the last completed cleanup run, or null if never run.
        lastRunDeleted:
          type: integer
          nullable: true
          description: Number of rows deleted in the last cleanup run, or null if never run.

    CleanupStats:
      type: object
      required: [qrCleanup, auditReportCleanup]
      properties:
        qrCleanup:
          $ref: "#/components/schemas/CleanupJobStats"
        auditReportCleanup:
          $ref: "#/components/schemas/CleanupJobStats"

    QrCleanupConfig:
      type: object
      required: [retentionDays, lastRunAt, lastDeleted]
      properties:
        retentionDays:
          type: integer
          minimum: 0
          maximum: 365
          description: >
            Days to retain expired/used QR codes before auto-deleting them.
            Set to 0 to disable automatic cleanup.
        lastRunAt:
          type: string
          format: date-time
          nullable: true
          description: ISO timestamp of the last cleanup run, or null if never run.
        lastDeleted:
          type: integer
          nullable: true
          description: Number of QR codes deleted in the last cleanup run, or null if never run.

    VaCleanupConfig:
      type: object
      required: [retentionDays, lastRunAt, lastDeleted]
      properties:
        retentionDays:
          type: integer
          minimum: 0
          maximum: 365
          description: >
            Days to retain closed virtual accounts before auto-deleting them.
            Set to 0 to disable automatic cleanup.
        lastRunAt:
          type: string
          format: date-time
          nullable: true
          description: ISO timestamp of the last cleanup run, or null if never run.
        lastDeleted:
          type: integer
          nullable: true
          description: Number of virtual accounts deleted in the last cleanup run, or null if never run.

    QuietHoursFlushConfig:
      type: object
      required: [intervalSeconds]
      properties:
        intervalSeconds:
          type: integer
          minimum: 10
          maximum: 86400
          description: >
            How often (in seconds) the quiet hours email sweeper scans for ready queues.
            Minimum 10 s, maximum 86 400 s (24 h). Default 60 s.

    TestEmailRetentionConfig:
      type: object
      required: [retentionDays]
      properties:
        retentionDays:
          type: integer
          minimum: 0
          maximum: 365
          description: >
            Days to retain test email audit log entries before auto-deleting them.
            Set to 0 to disable automatic cleanup.

    QrCleanupRunResult:
      type: object
      required: [expired, deleted]
      properties:
        expired:
          type: integer
          description: Number of QR codes marked as expired by this cleanup run.
        deleted:
          type: integer
          description: Number of QR codes deleted by this cleanup run.

    VaCleanupRunResult:
      type: object
      required: [closed, deleted]
      properties:
        closed:
          type: integer
          description: Number of virtual accounts closed by this cleanup run.
        deleted:
          type: integer
          description: Number of virtual accounts deleted by this cleanup run.

    TestEmailRetentionRunResult:
      type: object
      required: [deleted]
      properties:
        deleted:
          type: integer
          description: Number of test email history rows deleted by this cleanup run.

    CleanupRunHistoryEntry:
      type: object
      required: [id, ranAt, deleted, retentionDays, trigger]
      properties:
        id:
          type: integer
        trigger:
          type: string
          enum: [scheduled, manual]
          description: Whether this run was triggered by the cron schedule or manually by an admin.
        ranAt:
          type: string
          format: date-time
          description: ISO timestamp of when the cleanup run occurred.
        expired:
          type: integer
          nullable: true
          description: Number of QR codes marked as expired in this run (QR cleanup only).
        closed:
          type: integer
          nullable: true
          description: Number of virtual accounts closed in this run (VA cleanup only).
        deleted:
          type: integer
          description: Number of records deleted in this run.
        retentionDays:
          type: integer
          description: Retention window in days that was active during this run.
        triggeredBy:
          type: string
          description: '"manual" for admin-triggered runs, "scheduled" for cron-triggered runs.'

    CleanupRunHistoryResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/CleanupRunHistoryEntry"

    StorageCleanupRun:
      type: object
      required: [id, createdAt, totalScanned, deleted, errors]
      properties:
        id:
          type: integer
        createdAt:
          type: string
          format: date-time
        totalScanned:
          type: integer
          description: Total number of files scanned during the run
        deleted:
          type: integer
          description: Number of orphaned files deleted
        errors:
          type: integer
          description: Number of deletion errors encountered
        triggeredBy:
          type: ["string", "null"]
          description: "scheduled | manual"

    StorageCleanupRunResult:
      type: object
      required: [totalScanned, deleted, errors]
      properties:
        totalScanned:
          type: integer
        deleted:
          type: integer
        errors:
          type: integer

    SignatureFailureAlertLogEntryAffectedMerchantsItem:
