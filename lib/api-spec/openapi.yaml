    delete:
      operationId: deleteAdminMerchantReportSchedule
      tags: [reports]
      summary: Admin — remove a merchant's report schedule
      parameters:
        - name: merchantId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /reports/schedules/send-all-overdue:
    post:
      operationId: sendAllOverdueReports
      tags: [reports]
      summary: Admin — send reports immediately to all overdue schedules
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                merchantIds:
                  type: array
                  items:
                    type: integer
                  description: >
                    Explicit list of merchant IDs to send to. When provided, only
                    these merchants are targeted (still filtered to active + overdue).
                    When omitted, all overdue active schedules are targeted.
      responses:
        "200":
          description: Bulk send result
          content:
            application/json:
              schema:
                type: object
                required: [sent, failed, total, failures]
                properties:
                  sent:
                    type: integer
                    description: Number of reports successfully sent
                  failed:
                    type: integer
                    description: Number of reports that failed to send
                  total:
                    type: integer
                    description: Total overdue schedules processed
                  failures:
                    type: array
                    description: Per-merchant failure details
                    items:
                      type: object
                      required: [merchantId, merchantName, email, reason]
                      properties:
                        merchantId:
                          type: integer
                        merchantName:
                          type: string
                        email:
                          type: string
                        reason:
                          type: string
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /reports/schedules/delivery-history:
    get:
      operationId: getAdminReportDeliveryHistory
      tags: [reports]
      summary: Admin — consolidated delivery log across all merchants
      parameters:
        - name: merchantId
          in: query
          schema:
            type: integer
          description: Filter by a specific merchant
        - name: dateFrom
          in: query
          schema:
            type: string
          description: ISO date — only return attempts on or after this date
        - name: dateTo
          in: query
          schema:
            type: string
          description: ISO date — only return attempts on or before this date
        - name: success
          in: query
          schema:
            type: string
            enum: ["true", "false"]
          description: Filter by outcome (omit for all)
        - name: triggeredBy
          in: query
          schema:
            type: string
            enum: ["manual", "bulk", "scheduler"]
          description: Filter by what triggered the delivery — manual (send-now), bulk (send-all-overdue), or scheduler (automated cron)
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 100
          description: Maximum rows to return (default 100, max 200)
      responses:
        "200":
          description: Delivery log rows newest-first
          content:
            application/json:
              schema:
                type: object
                required: [logs]
                properties:
                  logs:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminReportDeliveryLog"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /reports/schedules/{merchantId}/reenable:
    patch:
      operationId: reenableAdminMerchantReportSchedule
      tags: [reports]
      summary: Admin — re-enable a merchant's auto-paused report schedule (resets consecutiveFailures, sets isActive=true)
      parameters:
        - name: merchantId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
