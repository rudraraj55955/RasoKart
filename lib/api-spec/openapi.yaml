        expiredCount: { type: integer }

    ReconciliationNextRun:
      type: object
      required: [nextRunAt]
      properties:
        nextRunAt:
          type: string
          nullable: true
          description: ISO timestamp of the next scheduled reconciliation run
        serverTimezone:
          type: string
          nullable: true
          description: IANA timezone name of the server (e.g. "America/New_York") used to interpret scheduled hour/minute

    ReconciliationScheduleConfig:
      type: object
      required: [hour, minute, lookbackDays, enabled]
      properties:
        hour:
          type: integer
          minimum: 0
          maximum: 23
          description: Hour of day (0-23) to run the scheduled reconciliation
        minute:
          type: integer
          minimum: 0
          maximum: 59
          description: Minute of the hour (0-59) to run the scheduled reconciliation
        lookbackDays:
          type: integer
          minimum: 1
          maximum: 90
          description: Number of days to look back when running the scheduled reconciliation
        enabled:
          type: boolean
          description: Whether the scheduled auto-reconciliation is enabled

    QrCleanupConfig:
      type: object
      required: [retentionDays]
      properties:
        retentionDays:
          type: integer
          minimum: 0
          maximum: 365
          description: >
            Days to retain expired/used QR codes before auto-deleting them.
            Set to 0 to disable automatic cleanup.

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
          description: Original file name.
        size:
          type: integer
          minimum: 1
          description: File size in bytes.
        contentType:
          type: string
          minLength: 1
          description: MIME type of the file (e.g. image/jpeg).
        contentHash:
          type: string
          pattern: '^[0-9a-f]{64}$'
          description: SHA-256 hex digest of the file contents. When provided, the server deduplicates uploads — if an identical file has already been uploaded by this merchant, the existing objectPath is returned and no new presigned URL is issued.
    UploadUrlResponse:
      type: object
      required: [objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
          description: >
            Presigned GCS URL for PUT upload.
            Omitted when deduplicated is true — no upload is needed in that case.
        objectPath:
          type: string
          description: Normalized object path (e.g. /objects/uploads/uuid). Store this in your database.
        deduplicated:
          type: boolean
          description: >
            True when the file was already uploaded (matched by contentHash). In this case
            uploadURL is absent — no upload is needed; use objectPath directly.
        metadata:
          $ref: '#/components/schemas/UploadUrlRequest'
