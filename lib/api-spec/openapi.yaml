          nullable: true
        reviewerName:
          type: string
          nullable: true
        status:
          type: string
        adminNote:
          type: string
          nullable: true
        createdAt:
          type: string

    KycReviewHistoryResponse:
      type: object
      required: [data, total]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/KycReviewHistoryEntry"
        total:
          type: integer

    GithubSyncConfig:
      type: object
      required: [enabled, schedule, failureThreshold, renotifyInterval, divergeAction]
      properties:
        enabled:
          type: boolean
          description: Whether the GitHub sync job is enabled
        schedule:
          type: string
          description: Cron expression for the sync schedule (e.g. "0 2 * * *")
        failureThreshold:
          type: integer
          minimum: 1
          description: Number of consecutive sync failures required before the admin dashboard banner and the escalation email fire. Defaults to 3.
        renotifyInterval:
          type: integer
          minimum: 1
          description: Once the failure threshold is crossed, only re-send the escalation email every N additional consecutive failures beyond it. Defaults to 10.
        divergeAction:
          type: string
          enum: [alert_only, alert_and_push]
          description: "What the scheduled sync should do when the remote has commits not present locally (diverged history). alert_only: skip the push and send an email alert (safe default for unattended runs). alert_and_push: force-push anyway but also send an alert email so admins know commits were discarded."

    GithubSyncStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [success, failure, skipped, never, running]
          description: Outcome of the last GitHub sync run, "skipped" when a divergence was detected and divergeAction is alert_only, "never" if the script has not run yet, or "running" while a manually-triggered sync is in progress
        syncedAt:
          type: string
          format: date-time
          description: ISO timestamp of when the last sync completed
        errorMessage:
          type: string
          description: Error detail when status is "failure"
        repo:
          type: string
          description: GitHub repository that was synced

    GithubSyncHistoryEntry:
      type: object
      required: [status, syncedAt, repo]
      properties:
        id:
          type: string
          description: Unique identifier for this sync run, used to fetch its full captured log via /github-sync/history/{id}/log. Absent on entries recorded before this field was introduced.
        status:
          type: string
          enum: [success, failure, skipped]
          description: Outcome of the sync run — "skipped" means a divergence was detected and divergeAction was alert_only, so the push was intentionally skipped to protect remote history
        syncedAt:
          type: string
          format: date-time
          description: ISO timestamp of when the sync completed
        repo:
          type: string
          description: GitHub repository that was synced
        errorMessage:
          type: string
          description: Error detail when status is "failure"
        hasLog:
          type: boolean
          description: Whether a full captured log is available for this run via /github-sync/history/{id}/log
        retryOf:
          type: string
          description: ID of the earlier failed sync run that this run was retrying, if this run was triggered as a retry.
        skipReason:
          type: string
          description: Human-readable explanation of why the run was skipped, e.g. "Remote was ahead by 3 commit(s) at the time of the skip". Only present when status is "skipped".
        remoteAheadBy:
          type: integer
          description: Number of commits the remote was ahead of local HEAD at the time the sync was skipped due to divergence. Only present when status is "skipped".

    GithubSyncHistory:
      type: object
      required: [entries]
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/GithubSyncHistoryEntry"
          description: Past sync runs, newest first, capped at 50

    GithubSyncLastCleanup:
      type: object
      required: [hasRun]
      properties:
        hasRun:
          type: boolean
          description: Whether the orphaned log file cleanup has ever run (nightly scheduler, startup sweep, or manual trigger)
        deleted:
          type: integer
          description: Number of orphaned log files deleted in the last run. Only present when hasRun is true.
        errors:
          type: integer
          description: Number of files that could not be deleted in the last run due to filesystem errors. Only present when hasRun is true.
        ranAt:
          type: string
          format: date-time
          description: ISO timestamp of when the last cleanup run completed. Only present when hasRun is true.

    GithubSyncDivergence:
      type: object
      required: [checked, diverged]
      properties:
        checked:
          type: boolean
          description: Whether the divergence check could actually be performed (false if GITHUB_TOKEN is missing or the fetch failed)
        diverged:
          type: boolean
          description: True if the remote main branch has commits that are not present in the local history. A force-push would discard them.
        remoteAheadBy:
          type: integer
          description: Number of commits present on the remote but not reachable from local HEAD
        repo:
          type: string
          description: GitHub repository that was checked
        reason:
          type: string
          description: Human-readable reason the check could not be performed, or a note (e.g. remote branch does not exist yet)

    GithubSyncRunLog:
      type: object
      required: [log]
      properties:
        log:
          type: string
          description: Full captured stdout/stderr output for this sync run (git fetch/push commands)

    SavedFilter:
      type: object
      required: [id, name, rawInput, filterData, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        rawInput:
          type: string
        filterData:
          type: object
          description: SmartFilter JSON object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time

    CreateSavedFilterInput:
      type: object
