            application/json:
              schema:
                type: object
                properties:
                  migrated:
                    type: boolean
                  migratedAt:
                    type: string
                    format: date-time
                    nullable: true
                  cutoffAt:
                    type: string
                    format: date-time
                    nullable: true
                  totalUsers:
                    type: integer
                  templateRows:
                    type: integer
                  overrideRows:
                    type: integer
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /iam/migration/run:
    post:
      tags: [IAM]
      summary: Run IAM migration (Super Admin only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Migration complete
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string
                  totalUsers:
                    type: integer
                  templateRows:
                    type: integer
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "409":
          description: Migration already run

  /iam/migration/rollback:
    post:
      tags: [IAM]
      summary: Roll back IAM migration (Super Admin only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Rollback complete
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string
                  deletedTemplateRows:
                    type: integer
                  deletedOverrideRows:
                    type: integer
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /iam/roles:
    get:
      tags: [IAM]
      summary: List role permission templates
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Roles with permission maps
          content:
            application/json:
              schema:
                type: object
                properties:
                  roles:
                    type: array
                    items:
                      type: string
                  permissions:
                    type: object
                    additionalProperties:
                      type: object
                      additionalProperties:
                        type: boolean
                  total:
                    type: integer
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /iam/roles/{role}/{permissionKey}:
    put:
      tags: [IAM]
      summary: Update a role template permission (Super Admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: role
          in: path
          required: true
          schema:
            type: string
        - name: permissionKey
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [isEnabled]
              properties:
                isEnabled:
                  type: boolean
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  role:
                    type: string
                  permissionKey:
                    type: string
                  isEnabled:
                    type: boolean
        "400":
          description: Invalid role or permission key
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /iam/users:
    get:
      tags: [IAM]
      summary: List users with IAM summary
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        email:
                          type: string
                        role:
                          type: string
                        isSuperAdmin:
                          type: boolean
                        overrideCount:
                          type: integer
                        createdAt:
                          type: string
                          format: date-time
                  total:
                    type: integer
                  page:
                    type: integer
                  limit:
                    type: integer
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /iam/users/{userId}/permissions:
    get:
      tags: [IAM]
      summary: Get effective permissions for a user
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User effective permissions
          content:
            application/json:
              schema:
                type: object
                properties:
                  userId:
                    type: integer
                  role:
                    type: string
                  isSuperAdmin:
                    type: boolean
                  effectivePermissions:
                    type: object
                    additionalProperties:
                      type: boolean
                  overrides:
                    type: array
                    items:
                      type: object
                      properties:
                        permissionKey:
                          type: string
                        effect:
                          type: string
                          enum: [ALLOW, DENY]
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: User not found

  /iam/users/{userId}/permissions/{permissionKey}:
    put:
      tags: [IAM]
      summary: Set a per-user permission override (Super Admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
        - name: permissionKey
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [effect]
              properties:
                effect:
                  type: string
                  enum: [ALLOW, DENY]
      responses:
        "200":
          description: Override set
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  userId:
                    type: integer
                  permissionKey:
                    type: string
                  effect:
                    type: string
                    enum: [ALLOW, DENY]
        "400":
          description: Invalid input
        "401":
          description: Unauthorized
        "403":
          description: Forbidden - including when granting SA-only permission to non-SA user
        "404":
          description: User not found
    delete:
      tags: [IAM]
      summary: Remove a per-user permission override (Super Admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
        - name: permissionKey
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Override removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  userId:
                    type: integer
                  permissionKey:
                    type: string
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /iam/audit:
    get:
      tags: [IAM]
      summary: List IAM audit log entries
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: IAM audit entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        adminEmail:
                          type: string
                        action:
                          type: string
                        targetType:
                          type: string
                        targetId:
                          type: integer
                          nullable: true
                        details:
                          type: object
                          nullable: true
                          additionalProperties: true
                        createdAt:
                          type: string
                          format: date-time
                  page:
                    type: integer
                  limit:
                    type: integer
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

