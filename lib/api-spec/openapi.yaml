    AuditReportSchedule:
      type: object
      required: [id, frequency, recipientEmail, isActive, maxRetryAttempts, retryBackoffMinutes, consecutiveFailures, autoPauseAfterFailures, lastSendStatus, sendCount, successCount, retryInProgress, currentRetryAttempt, createdAt, updatedAt, nextRetryAt, lastDeliveryAttempts]
      properties:
        id:
          type: integer
        frequency:
          type: string
          enum: [daily, weekly, monthly]
        recipientEmail:
          type: string
        isActive:
          type: boolean
        lastSentAt:
          type: ["string", "null"]
        lastSendStatus:
          type: string
          enum: [ok, failed, none]
        lastErrorMessage:
          type: ["string", "null"]
        failureAcknowledgedAt:
          type: ["string", "null"]
        failureAcknowledgedByEmail:
          type: ["string", "null"]
        sendCount:
          type: integer
          description: Total number of send attempts (successful and failed) for this schedule.
        successCount:
          type: integer
          description: Number of successful deliveries for this schedule.
        retryInProgress:
          type: boolean
          description: True when the last delivery failed and automatic retries are still pending (currentRetryAttempt < maxRetryAttempts).
        currentRetryAttempt:
          type: integer
          description: The retry attempt number of the most recent log entry (0 = initial send, 1 = first retry, etc.).
        nextRetryAt:
          type: ["string", "null"]
          description: ISO timestamp of the next scheduled retry attempt (lastLogSentAt + retryBackoffMinutes). Null when no retry is pending.
        consecutiveFailures:
          type: integer
          description: Number of consecutive delivery failures since the last successful send (reset to 0 on success).
        autoPauseAfterFailures:
          type: integer
          description: The schedule is automatically set to inactive (paused) when consecutiveFailures reaches this threshold.
        lastDeliveryAttempts:
          type: integer
          description: Total number of send attempts (initial + retries) for the most recent delivery cycle. 0 if the schedule has never been sent, 1 if the last delivery succeeded or failed on the first try, >1 if retries were needed.
        lastSuccessWasManualRetry:
          type: boolean
          description: True when the most recent successful delivery was triggered manually by an admin via "Retry Now". Null/false when the last success was automatic or there has been no successful delivery.
        createdAt:
          type: string
        updatedAt:
          type: string

    AuditReportScheduleInput:
      type: object
      required: [frequency, recipientEmail]
      properties:
        frequency:
          type: string
          enum: [daily, weekly, monthly]
        recipientEmail:
          type: string

    AuditReportSchedulePatch:
      type: object
      properties:
        frequency:
          type: string
          enum: [daily, weekly, monthly]
