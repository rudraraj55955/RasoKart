      properties:
        name:
          type: string
        count:
          type: integer

    SignatureFailureAlertLogEntry:
      type: object
      required: [id, sentAt, failureCount, affectedMerchantCount, recipientCount, recipientEmails, affectedMerchants, windowHours, threshold, cooldownHours]
      properties:
        id:
          type: integer
        sentAt:
          type: string
          format: date-time
        failureCount:
          type: integer
          description: Total signature failures in the rolling window at the time the alert was sent
        affectedMerchantCount:
          type: integer
          description: Number of distinct merchants affected at the time the alert was sent
        recipientCount:
          type: integer
          description: Number of admin emails the alert was successfully delivered to
        recipientEmails:
          type: array
          items:
            type: string
          description: List of admin email addresses the alert was sent to
        affectedMerchants:
          type: array
          items:
            $ref: "#/components/schemas/SignatureFailureAlertLogEntryAffectedMerchantsItem"
          description: Per-merchant breakdown captured at alert dispatch time
        windowHours:
          type: integer
          description: Rolling window (hours) used to count failures
        threshold:
          type: integer
          description: Failure threshold that triggered this alert
        cooldownHours:
          type: integer
          description: Cooldown window (hours) that was active when this alert was sent

    SignatureFailureAlertHistoryResponse:
      type: object
      required: [data, total]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/SignatureFailureAlertLogEntry"
        total:
          type: integer

    WebhookFailureAlertLogEntry:
      type: object
      required: [id, sentAt, merchantId, failedUrl, attemptCount, recipientCount, recipientEmails]
      properties:
        id:
          type: integer
        sentAt:
          type: string
          format: date-time
        merchantId:
          type: integer
          description: The merchant whose webhook permanently failed
        failedUrl:
          type: string
          description: The webhook URL that failed
        attemptCount:
          type: integer
          description: Total delivery attempts made before the webhook was marked permanently failed
        recipientCount:
          type: integer
          description: Number of admin emails the alert was successfully delivered to
        recipientEmails:
          type: array
          items:
            type: string
          description: List of admin email addresses the alert was sent to

    WebhookFailureAlertHistoryResponse:
      type: object
      required: [data, total]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/WebhookFailureAlertLogEntry"
        total:
          type: integer


    AlertCooldownEntry:
      type: object
      required: [cooldownHours, cooldownActive]
      properties:
        lastSentAt:
          type: string
          format: date-time
          nullable: true
        cooldownHours:
          type: integer
        cooldownActive:
          type: boolean
        cooldownExpiresAt:
          type: string
          format: date-time
          nullable: true

    AlertCooldownStatus:
      type: object
      required: [webhookFailure, ekqr, signatureFailure]
      properties:
        webhookFailure:
          $ref: "#/components/schemas/AlertCooldownEntry"
        ekqr:
          $ref: "#/components/schemas/AlertCooldownEntry"
        signatureFailure:
          $ref: "#/components/schemas/AlertCooldownEntry"

    WebhookFailureAlertConfig:
      type: object
      required: [cooldownHours]
      properties:
        cooldownHours:
          type: integer
          minimum: 1
          maximum: 168
          description: Number of hours to suppress duplicate webhook failure alert emails for the same merchant. Default is 1.

    WebhookRetryDefaults:
      type: object
      required: [delay1, delay2, delay3]
      properties:
        delay1:
          type: integer
          minimum: 0
          description: System default delay in seconds before the first retry (after the 1st failure).
        delay2:
          type: integer
          minimum: 0
          description: System default delay in seconds before the second retry (after the 2nd failure).
        delay3:
          type: integer
          minimum: 0
          description: System default delay in seconds before the third and subsequent retries.

    WebhookRetriesConfig:
      type: object
      required: [maxAttempts, delay1, delay2, delay3]
      properties:
        maxAttempts:
          type: integer
          minimum: 1
          maximum: 10
          description: Total maximum delivery attempts (1 initial + retries). Default is 4 (1 initial + 3 retries).
        delay1:
          type: integer
          minimum: 0
          description: Delay in seconds before the first retry (after the 1st failure).
        delay2:
          type: integer
          minimum: 0
          description: Delay in seconds before the second retry (after the 2nd failure).
        delay3:
          type: integer
          minimum: 0
          description: Delay in seconds before the third retry (after the 3rd failure).

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
          description: Original file name.
        size:
          type: integer
          minimum: 1
          description: File size in bytes.
        contentType:
          type: string
          minLength: 1
          description: MIME type of the file (e.g. image/jpeg).
        contentHash:
          type: string
          pattern: '^[0-9a-f]{64}$'
          description: SHA-256 hex digest of the file contents. When provided, the server deduplicates uploads — if an identical file has already been uploaded by this merchant, the existing objectPath is returned and no new presigned URL is issued.
    UploadUrlResponse:
      type: object
      required: [objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
          description: >
            Presigned GCS URL for PUT upload.
            Omitted when deduplicated is true — no upload is needed in that case.
        objectPath:
          type: string
          description: Normalized object path (e.g. /objects/uploads/uuid). Store this in your database.
        deduplicated:
          type: boolean
          description: >
            True when the file was already uploaded (matched by contentHash). In this case
            uploadURL is absent — no upload is needed; use objectPath directly.
        metadata:
          $ref: '#/components/schemas/UploadUrlRequest'

    EkqrConfig:
      type: object
      required: [apiKeySet, apiKeyMasked, enabled, webhookSecretSet, env]
      properties:
        apiKeySet:
          type: boolean
          description: Whether an EKQR API key has been configured
        apiKeyMasked:
          type: string
          description: Masked version of the API key (first 4 + last 4 chars visible)
        enabled:
          type: boolean
          description: Whether EKQR gateway is enabled
        webhookSecretSet:
          type: boolean
          description: Whether a webhook signature secret has been configured
        env:
          type: string
          enum: [test, live]
          description: EKQR gateway environment (test or live)
        lastUpdatedByEmail:
          type: string
          nullable: true
          description: Email of the admin who most recently changed this gateway's config
        lastUpdatedAt:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of the most recent config change for this gateway

    EkqrConfigInput:
      type: object
      properties:
        apiKey:
          type: string
          description: EKQR API key (omit to leave unchanged)
        enabled:
          type: boolean
          description: Whether to enable/disable EKQR gateway
        env:
          type: string
          enum: [test, live]
          description: EKQR gateway environment (omit to leave unchanged)
        webhookSecret:
          type: string
          description: EKQR webhook signature secret (omit to leave unchanged, empty string to clear)

