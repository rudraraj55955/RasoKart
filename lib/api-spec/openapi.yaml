    ReportSchedule:
      type: object
      required: [id, merchantId, frequency, format, isActive, consecutiveFailures, autoPauseAfterFailures, createdAt, updatedAt]
      properties:
        id:
          type: integer
        merchantId:
          type: integer
        frequency:
          type: string
          enum: [weekly, monthly]
        format:
          type: string
          enum: [xlsx, pdf]
        isActive:
          type: boolean
        dayOfWeek:
          type: ["integer", "null"]
          minimum: 0
          maximum: 6
          description: Day of week for weekly reports (0=Sun, 1=Mon, …, 6=Sat). Null uses rolling 7-day cadence.
        dayOfMonth:
          type: ["integer", "null"]
          minimum: 1
          maximum: 28
          description: Day of month for monthly reports (1–28). Null uses rolling 30-day cadence.
        lastSentAt:
          type: ["string", "null"]
          description: ISO timestamp of last successful send
        consecutiveFailures:
          type: integer
          description: Count of consecutive delivery failures since the last success
        autoPauseAfterFailures:
          type: integer
          description: Threshold — schedule is auto-paused when consecutiveFailures reaches this value
        nextRunAt:
          type: ["string", "null"]
          description: Admin-set override for the next scheduled run. Cleared automatically after the report fires.
        lastDeliveryAt:
          type: ["string", "null"]
          description: ISO timestamp of the most recent delivery attempt (success or failure). Null if no attempts exist.
        lastDeliverySuccess:
          type: ["boolean", "null"]
          description: Whether the most recent delivery attempt succeeded. Null if no attempts exist.
        sevenDayTotal:
          type: integer
          description: Total delivery attempts in the last 7 days.
        sevenDaySuccesses:
          type: integer
          description: Successful delivery attempts in the last 7 days.
        createdAt:
          type: string
        updatedAt:
          type: string
        recentFailures:
          type: array
          description: Last 1–3 delivery failure log entries for auto-paused schedules. Empty for active or manually-paused schedules.
          items:
            $ref: "#/components/schemas/ReportDeliveryLog"

