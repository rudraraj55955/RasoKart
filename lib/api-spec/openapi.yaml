            application/json:
              schema:
                $ref: "#/components/schemas/Withdrawal"

  /withdrawals/{id}/reregister-beneficiary:
    post:
      operationId: reregisterWithdrawalBeneficiary
      tags: [withdrawals]
      summary: Force a fresh provider registration for this payout's beneficiary, clearing any stale/invalid provider id (admin only)
      parameters:
        - name: id
          in: path
