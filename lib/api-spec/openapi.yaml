          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Withdrawal"

  /withdrawals/{id}/refresh-status:
    post:
      operationId: refreshWithdrawalStatus
      tags: [withdrawals]
      summary: Refresh payout transfer status from provider (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated withdrawal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Withdrawal"

  /withdrawals/{id}/retry:
    post:
      operationId: retryWithdrawal
      tags: [withdrawals]
      summary: Retry a failed payout (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Retried withdrawal
