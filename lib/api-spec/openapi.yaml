          type: ["string", "null"]
          description: Email of the admin who manually triggered the delivery, if applicable
        performedByAdminId:
          type: ["integer", "null"]
          description: ID of the admin who performed this action (e.g. re-enabling a paused schedule)
        performedByAdminEmail:
          type: ["string", "null"]
          description: Email of the admin who performed this action, denormalised for display without a join
        maxAttempts:
          type: ["integer", "null"]
          description: Maximum delivery attempts configured at the time of this event (recorded on auto-pause entries)
        backoffBaseMs:
