openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: RasoKart Payment Gateway API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: merchants
    description: Merchant management
  - name: transactions
    description: Transaction management
  - name: withdrawals
    description: Withdrawal requests
  - name: api-keys
    description: API key management
  - name: webhooks
    description: Webhook configuration
  - name: callbacks
    description: Callback logs
  - name: settlements
    description: Settlement reports
  - name: users
    description: User management
  - name: dashboard
    description: Dashboard statistics
  - name: products
    description: Merchant products marketplace
  - name: connections
    description: Merchant payment provider connections
  - name: plans
    description: Subscription plans
  - name: qr-codes
    description: QR code management
  - name: virtual-accounts
    description: Virtual account management
  - name: feature-control
    description: Merchant feature toggles
  - name: account-details
    description: Admin-managed payment collection accounts
  - name: invoices
    description: Merchant subscription invoices
  - name: ledger
    description: Merchant balance ledger entries
  - name: providers
    description: Payment provider catalogue and visibility control
  - name: notifications
    description: In-app notification centre for merchants and admins
  - name: reconciliation
    description: Deposit-to-settlement reconciliation engine
  - name: payment-links
    description: Shareable payment link management
  - name: system-config
    description: System-wide configuration settings for admins
  - name: company-settings
    description: Dynamic company branding / support contact settings (Super Admin managed)
  - name: storage
    description: Object storage upload and serving endpoints
  - name: saved-filters
    description: Admin-scoped saved smart search filter presets
  - name: github-sync
    description: GitHub repository sync status
  - name: security
    description: Merchant security event log
  - name: kyc
    description: KYC document verification for merchants
  - name: reports
    description: Transaction report generation for merchants and admins
  - name: support
    description: Merchant support ticket system
  - name: verification
    description: Merchant KYC/AML verification application system
  - name: tryit-presets
    description: Server-side storage for merchant Try It panel presets
  - name: IAM
    description: Identity and access management — permissions catalog, role templates, per-user overrides, and audit trail
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/register:
    post:
      operationId: registerMerchant
      tags: [auth]
      summary: Register merchant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MerchantRegisterInput"
      responses:
        "201":
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/merchant/otp/request:
    post:
      operationId: requestMerchantOtp
      tags: [auth]
      summary: Request a merchant login OTP
      description: Sends a one-time login code to a registered merchant's email if the identifier matches an account. Always returns the same safe message regardless of whether the account exists, to avoid leaking account existence.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MerchantOtpRequestInput"
      responses:
        "200":
          description: Safe acknowledgement (does not reveal whether the account exists)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/merchant/otp/verify:
    post:
      operationId: verifyMerchantOtp
      tags: [auth]
      summary: Verify a merchant login OTP and create a session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MerchantOtpVerifyInput"
      responses:
        "200":
          description: OTP verified — session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid or expired OTP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/merchant/password/forgot:
    post:
      operationId: requestMerchantPasswordReset
      tags: [auth]
      summary: Request a merchant password reset code
      description: Sends a password-reset OTP to a registered merchant's email if the identifier matches an account. Always returns the same safe message regardless of whether the account exists.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MerchantOtpRequestInput"
      responses:
        "200":
          description: Safe acknowledgement (does not reveal whether the account exists)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/merchant/password/reset:
    post:
      operationId: resetMerchantPassword
      tags: [auth]
      summary: Verify a merchant password reset OTP and set a new password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MerchantPasswordResetInput"
      responses:
        "200":
          description: Password reset successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid OTP, expired OTP, or weak password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/preferences:
    put:
      operationId: updateMyPreferences
      tags: [auth]
      summary: Update current user preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reconciliationAlertEmails:
                  type: boolean
                planExpiryAlertEmails:
                  type: boolean
                settlementStateEmails:
                  type: boolean
                signatureFailureAlertEmails:
                  type: boolean
                webhookFailureEmails:
                  type: boolean
                reportFailureAlertEmails:
                  type: boolean
                githubSyncFailureAlertEmails:
                  type: boolean
                  description: Whether the admin wants an escalated email when GitHub sync fails repeatedly (crosses the consecutive-failure threshold).
                weeklyDeliveryDigestEmails:
                  type: boolean
                  description: Whether the admin wants to receive the weekly report delivery health digest email.
                apiKeyGeneratedEmails:
                  type: boolean
                apiKeyRevokedEmails:
                  type: boolean
                loginAlertEmails:
                  type: boolean
                reportScheduleChangedEmails:
                  type: boolean
                  description: Whether the merchant wants an email when an admin changes their report schedule.
                settlementStateChangedEmails:
                  type: boolean
                  description: Whether the merchant wants an email when their settlement request changes state.
                ekqrSyncAlertEmails:
                  type: boolean
                  description: Whether the merchant wants an email when an EKQR synchronisation issue is detected.
                planChangeEmails:
                  type: boolean
                  description: Whether the merchant wants an email when their subscription plan is changed by an admin.
                reconciliationAlertNotifs:
                  type: boolean
                  description: Whether the merchant wants in-app notifications for reconciliation alerts.
                planExpiryAlertNotifs:
                  type: boolean
                  description: Whether the merchant wants in-app notifications for plan expiry alerts.
                settlementStateNotifs:
                  type: boolean
                  description: Whether the merchant wants in-app notifications for settlement state updates.
                signatureFailureAlertNotifs:
                  type: boolean
                  description: Whether the merchant wants in-app notifications for signature failure alerts.
                webhookFailureNotifs:
                  type: boolean
                  description: Whether the merchant wants in-app notifications for webhook failure alerts.
                ekqrSyncAlertNotifs:
                  type: boolean
                  description: Whether the merchant wants in-app notifications for EKQR sync alerts.
                reportFailureAlertNotifs:
                  type: boolean
                  description: Whether the merchant wants in-app notifications for report failure alerts.
                weeklyDeliveryDigestNotifs:
                  type: boolean
                  description: Whether the merchant wants in-app notifications for weekly delivery digest.
                apiKeyGeneratedNotifs:
                  type: boolean
                  description: Whether the merchant wants in-app notifications when an API key is generated.
                apiKeyRevokedNotifs:
                  type: boolean
                  description: Whether the merchant wants in-app notifications when an API key is revoked.
                loginAlertNotifs:
                  type: boolean
                  description: Whether the merchant wants in-app notifications for new login alerts.
                reportScheduleChangedNotifs:
                  type: boolean
                  description: Whether the merchant wants in-app notifications when their report schedule changes.
                settlementStateChangedNotifs:
                  type: boolean
                  description: Whether the merchant wants in-app notifications when their settlement state changes.
                planChangeNotifs:
                  type: boolean
                  description: Whether the merchant wants in-app notifications when their plan is changed.
                quietHoursStart:
                  type: ["string", "null"]
                  description: Start of quiet hours window in HH:mm 24h format (e.g. "22:00"). Null clears quiet hours.
                quietHoursEnd:
                  type: ["string", "null"]
                  description: End of quiet hours window in HH:mm 24h format (e.g. "07:00"). Null clears quiet hours.
                quietHoursTimezone:
                  type: ["string", "null"]
                  description: IANA timezone for interpreting quiet hours (e.g. "Asia/Kolkata"). Null clears quiet hours.
      responses:
        "200":
          description: Updated preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/snooze-reports-badge:
    patch:
      operationId: snoozeReportsBadge
      tags: [auth]
      summary: Set or clear the reports sidebar badge snooze for the current admin (deprecated — use /auth/snooze-badge)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                snoozedUntil:
                  type: ["string", "null"]
                  description: ISO timestamp to snooze until, or null to clear the snooze.
      responses:
        "200":
          description: Snooze updated
          content:
            application/json:
              schema:
                type: object
                required: [reportsBadgeSnoozedUntil]
                properties:
                  reportsBadgeSnoozedUntil:
                    type: ["string", "null"]
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/snooze-badge:
    patch:
      operationId: snoozeBadge
      tags: [auth]
      summary: Set or clear a named sidebar badge snooze for the current admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [badgeKey]
              properties:
                badgeKey:
                  type: string
                  description: The badge identifier to snooze (e.g. "reports", "audit").
                snoozedUntil:
                  type: ["string", "null"]
                  description: ISO timestamp to snooze until, or null to clear the snooze for this badge.
      responses:
        "200":
          description: Snooze updated
          content:
            application/json:
              schema:
                type: object
                required: [badgeKey, snoozedUntil]
                properties:
                  badgeKey:
                    type: string
                  snoozedUntil:
                    type: ["string", "null"]
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/quiet-hours/queue:
    get:
      operationId: listQuietHoursQueue
      tags: [auth]
      summary: List queued quiet-hours emails
      description: Returns all unflushed emails currently held in the quiet-hours queue for the authenticated user, ordered by scheduled delivery time.
      responses:
        "200":
          description: List of queued emails
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      required: [id, subject, deliverAfter, createdAt]
                      properties:
                        id:
                          type: number
                          description: Queue entry ID.
                        subject:
                          type: string
                          description: Email subject line.
                        deliverAfter:
                          type: string
                          format: date-time
                          description: Scheduled delivery time (ISO 8601).
                        createdAt:
                          type: string
                          format: date-time
                          description: When the email was queued (ISO 8601).
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/quiet-hours/queue-count:
    get:
      operationId: getQuietHoursQueueCount
      tags: [auth]
      summary: Get quiet-hours queue count
      description: Returns the number of unflushed emails currently held in the quiet-hours queue for the authenticated user.
      responses:
        "200":
          description: Queue count
          content:
            application/json:
              schema:
                type: object
                required: [count]
                properties:
                  count:
                    type: number
                    description: Number of unflushed emails in the quiet-hours queue.
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/quiet-hours/flush:
    post:
      operationId: flushQuietHoursQueue
      tags: [auth]
      summary: Flush queued quiet-hours emails
      description: Immediately delivers any queued notification emails whose deliver-after time has already passed for the authenticated user.
      responses:
        "200":
          description: Flush result
          content:
            application/json:
              schema:
                type: object
                required: [message, flushed]
                properties:
                  message:
                    type: string
                  flushed:
                    type: number
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/trusted-ips:
    get:
      operationId: listTrustedIps
      tags: [auth]
      summary: List trusted IP addresses
      description: Returns all trusted IP addresses for the authenticated merchant user.
      responses:
        "200":
          description: List of trusted IPs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrustedIpListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Merchant access only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/trusted-ips/{id}:
    delete:
      operationId: deleteTrustedIp
      tags: [auth]
      summary: Remove a trusted IP address
      description: Removes a trusted IP so login alerts will resume from that IP.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Trusted IP removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/chart:
    get:
      operationId: getDashboardChart
      tags: [dashboard]
      summary: Get chart data for last 30 days
      responses:
        "200":
          description: Chart data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChartDataPoint"

  /merchants:
    get:
      operationId: listMerchants
      tags: [merchants]
      summary: List merchants
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected, all]
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: expiryStatus
          in: query
          schema:
            type: string
            enum: [expiring, expired]
        - name: rejectionReason
          in: query
          schema:
            type: string
        - name: callbackSecretSet
          in: query
          description: Filter by whether merchants have a callback secret configured. "true" = secret set, "false" = no secret.
          schema:
            type: string
            enum: ["true", "false"]
        - name: loginAlertEmails
          in: query
          description: Filter by login alert email preference. "false" = alerts disabled, "true" = alerts enabled.
          schema:
            type: string
            enum: ["true", "false"]
        - name: securityEmailsDisabled
          in: query
          description: When "true", return only merchants who have at least one security email alert disabled (signature failure, webhook failure, API key generated, or API key revoked).
          schema:
            type: string
            enum: ["true"]
        - name: settlementStateEmails
          in: query
          description: Filter by settlement state email preference. "false" = settlement state emails disabled.
          schema:
            type: string
            enum: ["false"]
        - name: reportScheduleEmails
          in: query
          description: Filter by report schedule email preference. "false" = report schedule emails disabled.
          schema:
            type: string
            enum: ["false"]
        - name: planExpiryAlertEmails
          in: query
          description: Filter by plan expiry alert email preference. "false" = plan expiry alert emails disabled.
          schema:
            type: string
            enum: ["false"]
      responses:
        "200":
          description: List of merchants
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MerchantListResponse"

  /merchants/export/csv:
    get:
      operationId: exportMerchantsCsv
      tags: [merchants]
      summary: Export filtered merchant list as CSV (admin only)
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected, all]
        - name: search
          in: query
          schema:
            type: string
        - name: expiryStatus
          in: query
          schema:
            type: string
            enum: [expiring, expired]
        - name: rejectionReason
          in: query
          schema:
            type: string
        - name: callbackSecretSet
          in: query
          schema:
            type: string
            enum: ["true", "false"]
        - name: loginAlertEmails
          in: query
          schema:
            type: string
            enum: ["true", "false"]
        - name: securityEmailsDisabled
          in: query
          schema:
            type: string
            enum: ["true"]
        - name: settlementStateEmails
          in: query
          schema:
            type: string
            enum: ["false"]
        - name: reportScheduleEmails
          in: query
          schema:
            type: string
            enum: ["false"]
        - name: planExpiryAlertEmails
          in: query
          schema:
            type: string
            enum: ["false"]
      responses:
        "200":
          description: CSV file download
          content:
            text/csv:
              schema:
                type: string
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /merchants/me:
    patch:
      operationId: updateMerchantProfile
      tags: [merchants]
      summary: Update own merchant profile (merchant self-service)
      description: Allows a merchant to update their own editable profile fields (business name, contact name, phone, website).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MerchantProfileUpdateInput"
      responses:
        "200":
          description: Updated merchant profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Merchant"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not a merchant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /merchants/{id}:
    get:
      operationId: getMerchant
      tags: [merchants]
      summary: Get merchant by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Merchant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Merchant"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /merchants/{id}/plan:
    get:
      operationId: getMerchantPlan
      tags: [merchants]
      summary: Get current plan assignment for a merchant (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Merchant plan assignment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MerchantPlanWithDetails"
        "404":
          description: No plan assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /merchants/{id}/approve:
    post:
      operationId: approveMerchant
      tags: [merchants]
      summary: Approve merchant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Merchant approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Merchant"

  /merchants/{id}/force-approve:
    post:
      operationId: forceApproveMerchant
      tags: [merchants]
      summary: "Force approve merchant (Super Admin only) — bypasses KYC validation"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForceApproveInput"
      responses:
        "200":
          description: Merchant force-approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Merchant"

  /merchants/{id}/kyc-check:
    get:
      operationId: getMerchantKycCheck
      tags: [merchants]
      summary: Check which KYC documents are missing or unapproved for a merchant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: KYC check result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KycCheckResult"

  /merchants/{id}/reject:
    post:
      operationId: rejectMerchant
      tags: [merchants]
      summary: Reject merchant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectInput"
      responses:
        "200":
          description: Merchant rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Merchant"

  /merchants/{id}/suspend:
    post:
      operationId: suspendMerchant
      tags: [merchants]
      summary: Suspend merchant
      parameters:
        - name: id
