        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden — admin access required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No log available for this sync run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /github-sync/run:
    post:
      operationId: runGithubSync
      tags: [github-sync]
      summary: Manually trigger a GitHub sync run immediately
      description: Kicks off the GitHub sync script in the background, bypassing the enabled/schedule checks. Returns immediately with a "running" status; poll /github-sync/status for the outcome.
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                retryOf:
                  type: string
                  description: ID of a previous failed sync run this is retrying. Recorded in the audit log and in the history entry for traceability.
      responses:
        "202":
          description: Sync run started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GithubSyncStatus"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden — admin access required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: A sync run is already in progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /github-sync/cleanup-logs:
    post:
      operationId: runGithubSyncLogCleanup
      tags: [github-sync]
      summary: Delete orphaned GitHub sync log files
      description: Runs the log-file cleanup immediately — removes any .log files in .github-sync-logs/ whose IDs are not present in the sync history. Normally runs nightly via the scheduler; this endpoint lets admins trigger it on-demand after a crash or manual history reset.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Cleanup complete
          content:
            application/json:
              schema:
                type: object
                required: [deleted, errors]
                properties:
                  deleted:
                    type: integer
                    description: Number of orphaned log files deleted.
                  errors:
                    type: integer
                    description: Number of files that could not be deleted due to filesystem errors.
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden — admin access required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

