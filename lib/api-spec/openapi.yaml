openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: RasoKart Payment Gateway API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: merchants
    description: Merchant management
  - name: transactions
    description: Transaction management
  - name: withdrawals
    description: Withdrawal requests
  - name: api-keys
    description: API key management
  - name: webhooks
    description: Webhook configuration
  - name: callbacks
    description: Callback logs
  - name: settlements
    description: Settlement reports
  - name: users
    description: User management
  - name: dashboard
    description: Dashboard statistics
  - name: products
    description: Merchant products marketplace
  - name: connections
    description: Merchant payment provider connections
  - name: plans
    description: Subscription plans
  - name: qr-codes
    description: QR code management
  - name: virtual-accounts
    description: Virtual account management
  - name: feature-control
    description: Merchant feature toggles
  - name: account-details
    description: Admin-managed payment collection accounts
  - name: invoices
    description: Merchant subscription invoices
  - name: ledger
    description: Merchant balance ledger entries
  - name: providers
    description: Payment provider catalogue and visibility control
  - name: notifications
    description: In-app notification centre for merchants and admins
  - name: reconciliation
    description: Deposit-to-settlement reconciliation engine
  - name: payment-links
    description: Shareable payment link management
  - name: system-config
    description: System-wide configuration settings for admins
  - name: storage
    description: Object storage upload and serving endpoints
  - name: saved-filters
    description: Admin-scoped saved smart search filter presets
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/register:
    post:
      operationId: registerMerchant
      tags: [auth]
      summary: Register merchant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MerchantRegisterInput"
      responses:
        "201":
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/preferences:
    put:
      operationId: updateMyPreferences
      tags: [auth]
      summary: Update current user preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reconciliationAlertEmails:
                  type: boolean
                planExpiryAlertEmails:
                  type: boolean
                settlementStateEmails:
                  type: boolean
      responses:
        "200":
          description: Updated preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/chart:
    get:
      operationId: getDashboardChart
      tags: [dashboard]
      summary: Get chart data for last 30 days
      responses:
        "200":
          description: Chart data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChartDataPoint"

  /merchants:
    get:
      operationId: listMerchants
      tags: [merchants]
      summary: List merchants
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected, all]
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: expiryStatus
          in: query
          schema:
            type: string
            enum: [expiring, expired]
        - name: rejectionReason
          in: query
          schema:
            type: string
        - name: callbackSecretSet
          in: query
          description: Filter by whether merchants have a callback secret configured. "true" = secret set, "false" = no secret.
          schema:
            type: string
            enum: ["true", "false"]
      responses:
        "200":
          description: List of merchants
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MerchantListResponse"

  /merchants/{id}:
    get:
      operationId: getMerchant
      tags: [merchants]
      summary: Get merchant by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Merchant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Merchant"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /merchants/{id}/plan:
    get:
      operationId: getMerchantPlan
      tags: [merchants]
      summary: Get current plan assignment for a merchant (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Merchant plan assignment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MerchantPlanWithDetails"
        "404":
          description: No plan assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /merchants/{id}/approve:
    post:
      operationId: approveMerchant
      tags: [merchants]
      summary: Approve merchant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Merchant approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Merchant"

  /merchants/{id}/reject:
    post:
      operationId: rejectMerchant
      tags: [merchants]
      summary: Reject merchant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectInput"
      responses:
        "200":
          description: Merchant rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Merchant"

  /merchants/{id}/suspend:
    post:
      operationId: suspendMerchant
      tags: [merchants]
      summary: Suspend merchant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Merchant suspended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Merchant"

  /merchants/{id}/unsuspend:
    post:
      operationId: unsuspendMerchant
      tags: [merchants]
      summary: Unsuspend merchant (restore to approved)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Merchant unsuspended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Merchant"

  /merchants/{id}/plan/usage:
    get:
      operationId: getMerchantPlanUsageAdmin
      tags: [merchants]
      summary: Get QR and resource usage for a merchant (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Merchant plan usage
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanUsage"
        "404":
          description: No plan assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /merchants/{id}/plan/history:
    get:
      operationId: getMerchantPlanHistory
      tags: [merchants]
      summary: Get plan history for a merchant (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Plan history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlanHistory"

  /merchants/bulk-reject:
    post:
      operationId: bulkRejectMerchants
      tags: [merchants]
      summary: Bulk-reject multiple pending merchants (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkRejectInput"
      responses:
        "200":
          description: Merchants rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkMerchantActionResult"

  /merchants/bulk-approve:
    post:
      operationId: bulkApproveMerchants
      tags: [merchants]
      summary: Bulk-approve multiple merchants (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkMerchantActionInput"
      responses:
        "200":
          description: Merchants approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkMerchantActionResult"

  /merchants/bulk-suspend:
    post:
      operationId: bulkSuspendMerchants
      tags: [merchants]
      summary: Bulk-suspend or reinstate multiple merchants (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkSuspendInput"
      responses:
        "200":
          description: Merchants suspended or reinstated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkMerchantActionResult"

  /merchants/bulk-assign-plan:
    post:
      operationId: bulkAssignMerchantPlan
      tags: [merchants]
      summary: Bulk-assign a plan to multiple merchants (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkAssignPlanInput"
      responses:
        "200":
          description: Plans assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkMerchantActionResult"

  /merchants/bulk-unassign-plan:
    post:
      operationId: bulkUnassignMerchantPlan
      tags: [merchants]
      summary: Bulk-remove plan assignment from multiple merchants (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkMerchantActionInput"
      responses:
        "200":
          description: Plans unassigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkMerchantActionResult"

  /merchants/{id}/assign-plan:
    post:
      operationId: assignMerchantPlan
      tags: [merchants]
      summary: Assign plan to merchant (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignPlanInput"
      responses:
        "200":
          description: Plan assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MerchantPlan"

  /merchants/{id}/plan/upgrade:
    post:
      operationId: upgradeMerchantPlan
      tags: [merchants]
      summary: Upgrade merchant to a higher plan (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlanActionInput"
      responses:
        "200":
          description: Plan upgraded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MerchantPlan"

  /merchants/{id}/plan/downgrade:
    post:
      operationId: downgradeMerchantPlan
      tags: [merchants]
      summary: Downgrade merchant to a lower plan (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlanActionInput"
      responses:
        "200":
          description: Plan downgraded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MerchantPlan"

  /merchants/{id}/plan/suspend:
    post:
      operationId: suspendMerchantPlan
      tags: [merchants]
      summary: Suspend a merchant's plan (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlanNoteInput"
      responses:
        "200":
          description: Plan suspended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MerchantPlan"

  /merchants/{id}/plan/reinstate:
    post:
      operationId: reinstateMerchantPlan
      tags: [merchants]
      summary: Reinstate a suspended merchant plan (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlanNoteInput"
      responses:
        "200":
          description: Plan reinstated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MerchantPlan"

  /merchants/{id}/plan/renew:
    post:
      operationId: renewMerchantPlan
      tags: [merchants]
      summary: Renew a merchant's plan (extend expiry) (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenewPlanInput"
      responses:
        "200":
          description: Plan renewed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MerchantPlan"

  /merchants/{id}/plan/schedule-renewal:
    post:
      operationId: scheduleMerchantPlanRenewal
      tags: [merchants]
      summary: Set or cancel a scheduled auto-renewal date for a merchant's plan (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScheduleRenewalInput"
      responses:
        "200":
          description: Scheduled renewal updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MerchantPlan"

  /merchants/{id}/branding:
    patch:
      operationId: updateMerchantBranding
      tags: [merchants]
      summary: Update merchant branding (logo URL and brand colour). Merchant updates own; admin can update any.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MerchantBrandingInput"
      responses:
        "200":
          description: Updated merchant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Merchant"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /merchants/{id}/callback-secret:
    get:
      operationId: getAdminMerchantCallbackSecret
      tags: [merchants]
      summary: Get callback signing secret status for a merchant (admin only)
      description: Returns whether the merchant has a callback signing secret configured, plus a masked prefix. Never returns the raw secret value.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Callback secret status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallbackSecretStatus"
        "403":
          description: Admin access only
        "404":
          description: Merchant not found
    delete:
      operationId: resetAdminMerchantCallbackSecret
      tags: [merchants]
      summary: Force-reset (clear) a merchant's callback signing secret (admin only)
      description: Clears the merchant's callback signing secret so they can re-generate it. The action is logged in the audit log. Does not return the new secret — the merchant must rotate via their own endpoint.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Secret cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallbackSecretStatus"
        "403":
          description: Admin access only
        "404":
          description: Merchant not found

  /merchants/{id}/callback-window:
    patch:
      operationId: updateMerchantCallbackWindow
      tags: [merchants]
      summary: Update the per-merchant replay-protection timestamp window (admin only)
      description: Sets the number of seconds around the current time that an inbound callback X-Timestamp is considered valid. Pass null to reset to the global default (300 s).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CallbackWindowInput"
      responses:
        "200":
          description: Updated merchant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Merchant"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Admin access only
        "404":
          description: Merchant not found

  /merchants/{id}/invoices:
    get:
      operationId: listMerchantInvoices
      tags: [merchants]
      summary: List invoices for a specific merchant (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Invoice list for merchant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceListResponse"

  /invoices:
    get:
      operationId: listInvoices
      tags: [invoices]
      summary: List invoices (admin sees all, merchant sees own)
      parameters:
        - name: merchantId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Invoice list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceListResponse"
    post:
      operationId: createInvoice
      tags: [invoices]
      summary: Create invoice for a merchant (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceInput"
      responses:
        "201":
          description: Invoice created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /invoices/{id}:
    get:
      operationId: getInvoice
      tags: [invoices]
      summary: Get invoice by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /invoices/{id}/mark-paid:
    post:
      operationId: markInvoicePaid
      tags: [invoices]
      summary: Mark invoice as paid (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Invoice marked paid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /invoices/{id}/void:
    post:
      operationId: voidInvoice
      tags: [invoices]
      summary: Void an invoice (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Invoice voided
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /transactions:
    get:
      operationId: listTransactions
      tags: [transactions]
      summary: List transactions
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [deposit, withdrawal, all]
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, success, failed, all]
        - name: search
          in: query
          schema:
            type: string
        - name: merchantId
          in: query
          schema:
            type: integer
        - name: dateFrom
          in: query
          schema:
            type: string
        - name: dateTo
          in: query
          schema:
            type: string
        - name: amountMin
          in: query
          schema:
            type: number
        - name: amountMax
          in: query
          schema:
            type: number
        - name: connectionProvider
          in: query
          schema:
            type: string
            enum: [phonepe, paytm, bharatpe, yono_sbi, hdfc_smarthub, upi_id]
        - name: paymentLinkId
          in: query
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of transactions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionListResponse"
    post:
      operationId: adminCreateTransaction
      tags: [transactions]
      summary: Admin — manually record a transaction against a merchant (optionally attributed to a payment link)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminCreateTransactionInput"
      responses:
        "201":
          description: Transaction created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Merchant or payment link not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /transactions/simulate:
    post:
      operationId: simulatePayment
      tags: [transactions]
      summary: Simulate a payment received via QR code or Virtual Account (demo)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SimulatePaymentInput"
      responses:
        "201":
          description: Simulated deposit transaction
          content:
            application/json:
              schema:
