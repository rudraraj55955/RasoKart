          description: Merchant access only

  /api-keys/{id}:
    delete:
      operationId: revokeApiKey
      tags: [api-keys]
      summary: Revoke API key
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: API key revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /security/known-ips:
    get:
      operationId: listKnownLoginIps
      tags: [security]
      summary: List known login IP addresses
      description: Returns a deduplicated list of IP addresses that have previously logged into the merchant account, derived from merchant_login credential events. Capped at 10 most recently seen IPs. Merchant access only.
      responses:
        "200":
          description: List of known login IPs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnownLoginIpListResponse"
        "403":
          description: Merchant access only

  /security/known-ips/{ipAddress}/label:
    patch:
      operationId: labelKnownLoginIp
      tags: [security]
      summary: Label a known login IP as trusted or suspicious
      description: Sets or clears a merchant-assigned label (trusted or suspicious) for a known login IP address. Pass null to remove an existing label. Merchant access only.
      parameters:
        - name: ipAddress
          in: path
          required: true
          schema:
            type: string
          description: The IP address to label (URL-encoded if necessary)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LabelIpRequest"
      responses:
        "200":
          description: IP label updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnownLoginIp"
        "400":
          description: Invalid label value or IP not in known login list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "403":
          description: Merchant access only

  /security/events:
    get:
      operationId: listSecurityEvents
      tags: [security]
      summary: List merchant security events
      description: Returns a paginated list of security events for the authenticated merchant — logins, API key generation, API key revocation, and callback secret rotations. Merchant access only.
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 200
        - name: eventType
          in: query
          schema:
            type: string
          description: Filter by event type (merchant_login, api_key_generated, api_key_revoked, callback_secret_rotated)
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date
          description: "Filter events on or after this date (YYYY-MM-DD)"
        - name: dateTo
          in: query
          schema:
            type: string
            format: date
          description: "Filter events on or before this date (YYYY-MM-DD)"
        - name: ipAddress
          in: query
          schema:
            type: string
          description: "Filter events by IP address (exact match)"
      responses:
        "200":
          description: Paginated list of security events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecurityEventListResponse"
        "403":
          description: Merchant access only

  /webhooks/retry-defaults:
    get:
      operationId: getWebhookRetryDefaults
      tags: [webhooks]
      summary: Get system default webhook retry delays (merchant)
      description: Returns the platform-wide default delay schedule for webhook retries. Merchants use this to preview their retry timeline when per-webhook delay overrides are set to "System default".
      responses:
        "200":
          description: System default retry delays
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookRetryDefaults"
        "403":
          description: Merchants only

  /webhooks/logs:
    get:
      operationId: getWebhookLogs
      tags: [webhooks]
      summary: Get recent webhook delivery logs for the authenticated merchant
      description: Returns the last N callback log entries for the merchant's webhook, ordered newest first.
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 50
          description: Number of recent log entries to return (default 10, max 50)
        - name: from
          in: query
          schema:
            type: string
            format: date-time
          description: ISO 8601 timestamp — only include logs at or after this time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
          description: ISO 8601 timestamp — only include logs at or before this time
        - name: eventType
          in: query
          schema:
            type: string
          description: Filter by event type (e.g. payment.success)
        - name: status
          in: query
          schema:
            type: string
            enum: [success, failed, pending_retry]
          description: Filter by delivery status (success, failed, or pending_retry)
      responses:
        "200":
          description: Recent webhook delivery logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallbackLogListResponse"

  /callbacks/{id}/attempts:
    get:
      operationId: getWebhookLogAttempts
      tags: [callbacks]
      summary: Get per-attempt delivery history for a callback log entry
      description: Returns all individual delivery attempts for the given callback log ID.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of delivery attempts
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/CallbackLogAttempt"
        "403":
          description: Access denied
        "404":
          description: Callback log not found
  /webhooks/logs/stats:
    get:
      operationId: getWebhookLogStats
      tags: [webhooks]
      summary: Get per-event-type delivery stats for the authenticated merchant
      description: Returns aggregated delivery counts (total, success, failed) grouped by event type for the merchant's webhook logs. Only event types with at least one log entry are returned.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Per-event-type delivery stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookLogStatsResponse"
        "403":
          description: Merchants only


  /webhooks/logs/{id}/retry:
    post:
      operationId: retryWebhookLog
      tags: [webhooks]
      summary: Retry a failed webhook delivery
      description: |
        Immediately re-attempts delivery for a failed webhook log entry owned by
        the authenticated merchant. Only logs in `failed` status can be retried.
        On success the log is updated in-place and the refreshed entry is returned.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Retry result and updated log entry
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  delivered:
                    type: boolean
                  log:
                    $ref: "#/components/schemas/CallbackLog"
                required: [success, delivered, log]
        "400":
          description: Log is not in failed status or has no request body to replay
        "403":
          description: Merchant access only, or log does not belong to this merchant
        "404":
          description: Webhook log not found

  /webhooks/test:
    post:
      operationId: sendWebhookTest
      tags: [webhooks]
      summary: Send a test webhook event
      description: |
        Fires a sample payload for the specified event type to the merchant's configured
        webhook URL. Defaults to `payment.success` when no `eventType` is provided.
        If the merchant has set a webhook signing secret, the payload is signed with
        HMAC-SHA256 and the `X-Signature` header is included.
        Returns the HTTP status and truncated response body so the merchant can verify
        their endpoint is reachable and accepting signed payloads correctly.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookTestRequest"
      responses:
        "200":
          description: Test delivery result (regardless of remote response code)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookTestResult"
        "400":
          description: No webhook URL configured
        "403":
          description: Merchant access only

  /webhooks/platform-defaults:
    get:
      operationId: getWebhookPlatformDefaults
      tags: [webhooks]
      summary: Get platform-wide webhook retry defaults (merchant)
      description: Returns the admin-configured platform default for webhook retries. Available to all authenticated merchants.
      responses:
        "200":
          description: Platform webhook retry defaults
          content:
            application/json:
              schema:
                type: object
                required: [platformDefaultRetries]
                properties:
                  platformDefaultRetries:
                    type: integer
                    minimum: 0
                    description: Platform default number of automatic retry attempts for failed webhook deliveries.

  /webhooks:
    get:
      operationId: getWebhookConfig
      tags: [webhooks]
      summary: Get webhook configuration
      responses:
        "200":
          description: Webhook config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookConfig"
    put:
      operationId: updateWebhookConfig
      tags: [webhooks]
      summary: Update webhook configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookConfigInput"
      responses:
        "200":
          description: Webhook config updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookConfig"
        "422":
          description: maxRetries exceeds the admin-configured global cap
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /callbacks/stats:
    get:
      operationId: getCallbackStats
      tags: [callbacks]
      summary: Get callback signature failure stats
      description: Returns the count of signature verification failures in the last 24 hours for the authenticated merchant.
      responses:
        "200":
          description: Callback stats for the authenticated merchant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallbackStatsResponse"
        "403":
          description: Merchant access only

  /callbacks/admin/stats:
    get:
      operationId: getAdminCallbackStats
      tags: [callbacks]
      summary: Get aggregate callback signature failure stats across all merchants
      description: Admin-only. Returns the total signature verification failures and number of affected merchants in the last 24 hours across the entire platform.
      responses:
        "200":
          description: Aggregate callback stats for all merchants
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminCallbackStatsResponse"
        "403":
          description: Admin access only

  /callbacks:
    post:
      operationId: receivePaymentCallback
      tags: [callbacks]
      summary: Receive payment callback and mark matching QR code as used
      description: |
        Called by a payment provider or merchant back-end when a payment is received.
        Authentication is via the merchant's API key supplied in the X-Api-Key header.
        The merchantId is derived from the key — it does not need to be in the body.
        orderId takes priority over merchantReference when both are provided.

        If the merchant has configured a callback signing secret, the caller MUST also
        include an X-Signature header. The signature is computed as:
          HMAC-SHA256(callbackSecret, rawRequestBody)
        and sent as: `X-Signature: sha256=<hex_digest>`

        Example (Node.js):
          const sig = 'sha256=' + crypto.createHmac('sha256', secret).update(rawBody).digest('hex');
      parameters:
        - name: X-Api-Key
          in: header
          required: true
          schema:
            type: string
          description: Active merchant API key (rasokart_live_... prefix)
        - name: X-Signature
          in: header
          required: false
          schema:
            type: string
          description: |
            HMAC-SHA256 signature of the raw request body. Required when the merchant has
            configured a callback signing secret. Format: `sha256=<hex_digest>`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentCallbackInput"
      responses:
        "200":
          description: Callback processed, QR code marked as used
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentCallbackResponse"
        "400":
          description: Missing required fields (orderId or merchantReference)
        "401":
          description: Missing or invalid X-Api-Key or X-Signature header
        "404":
          description: No matching active QR code found for the given identifiers
    get:
      operationId: listCallbackLogs
      tags: [callbacks]
      summary: List callback logs
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [success, failed, pending_retry, all]
        - name: merchantId
          in: query
          schema:
            type: integer
          description: Filter by merchant ID (admin only)
        - name: qrCodeId
          in: query
          schema:
            type: integer
          description: Filter by QR code ID
        - name: signatureVerified
          in: query
          schema:
            type: string
            enum: [all, verified, failed, none]
          description: Filter by signature verification outcome. "verified" = passed, "failed" = rejected, "none" = no secret configured
        - name: rejectionReason
          in: query
          schema:
            type: string
            enum: [stale_timestamp, replay_detected, bad_signature, missing_header]
          description: >
            Filter failed logs by the specific rejection reason stored in responseBody.
            "stale_timestamp" = X-Timestamp outside ±window,
            "replay_detected" = duplicate nonce,
            "bad_signature" = HMAC mismatch,
            "missing_header" = required header absent.
        - name: eventType
          in: query
          schema:
            type: string
            enum: [payment.received, payment.success, payment.failed, payment.pending]
          description: Filter logs by webhook event type
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date
          description: Include only logs with createdAt on or after this date (YYYY-MM-DD, inclusive)
        - name: dateTo
          in: query
          schema:
            type: string
            format: date
          description: Include only logs with createdAt on or before this date (YYYY-MM-DD, inclusive end of day)
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of callback logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallbackLogListResponse"

  /callbacks/{id}/retry:
    post:
      operationId: retryCallback
      tags: [callbacks]
      summary: Manually retry a failed callback log
      description: Resets a failed callback log to pending_retry status with attempts set to 0 and nextRetryAt set to now. Admin access only.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Callback log reset to pending_retry
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  id:
                    type: integer
                required: [success, id]
        "400":
          description: Callback is not in failed status
        "403":
          description: Admin access only
        "404":
          description: Callback log not found

  /callbacks/secret:
    get:
      operationId: getCallbackSecret
      tags: [callbacks]
      summary: Get callback signing secret status
      description: Returns whether a callback signing secret is configured, plus a masked prefix. Merchant access only.
      responses:
        "200":
          description: Callback secret status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallbackSecretStatus"
        "403":
          description: Merchant access only

  /callbacks/secret/history:
    get:
      operationId: getCallbackSecretHistory
      tags: [callbacks]
      summary: Get credential event history for callback signing secret
      description: Returns a list of credential events derived from the merchant's callback signing secret (rotations). Merchant access only.
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date
          description: "Filter events on or after this date (YYYY-MM-DD)"
        - name: to
          in: query
          schema:
            type: string
            format: date
          description: "Filter events on or before this date (YYYY-MM-DD)"
      responses:
        "200":
          description: List of credential events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CredentialEventList"
        "403":
          description: Merchant access only
        "404":
          description: Merchant not found

  /callbacks/secret/rotate:
    post:
      operationId: rotateCallbackSecret
