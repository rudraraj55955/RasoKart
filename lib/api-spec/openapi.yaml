  /reports/schedule:
    get:
      operationId: getReportSchedule
      tags: [reports]
      summary: Get the merchant's own report schedule
      responses:
        "200":
          description: Current report schedule (null if none configured)
          content:
            application/json:
              schema:
                type: object
                required: [schedule]
                properties:
                  schedule:
                    oneOf:
                      - $ref: "#/components/schemas/ReportSchedule"
                      - type: "null"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
    put:
      operationId: upsertReportSchedule
      tags: [reports]
      summary: Create or update the merchant's report schedule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                frequency:
                  type: string
                  enum: [weekly, monthly]
                format:
                  type: string
                  enum: [xlsx, pdf]
                isActive:
                  type: boolean
                dayOfWeek:
                  type: integer
                  minimum: 0
                  maximum: 6
                  description: Day of week for weekly reports (0=Sun, 1=Mon, …, 6=Sat)
                dayOfMonth:
                  type: integer
                  minimum: 1
                  maximum: 28
                  description: Day of month for monthly reports (1–28)
                autoPauseAfterFailures:
                  type: integer
                  minimum: 1
                  maximum: 10
                  description: Number of consecutive delivery failures before the schedule is auto-paused (1–10)
      responses:
        "200":
          description: Updated report schedule
          content:
            application/json:
              schema:
                type: object
                required: [schedule]
                properties:
                  schedule:
                    $ref: "#/components/schemas/ReportSchedule"
        "400":
          description: Validation error
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
    delete:
      operationId: deleteReportSchedule
      tags: [reports]
      summary: Delete the merchant's report schedule
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /reports/schedule/reenable:
    patch:
      operationId: reenableReportSchedule
      tags: [reports]
      summary: Re-enable a paused report schedule (sets isActive=true, resets consecutiveFailures)
      responses:
        "200":
          description: Schedule re-enabled
          content:
            application/json:
              schema:
                type: object
                required: [schedule]
                properties:
                  schedule:
                    $ref: "#/components/schemas/ReportSchedule"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: No schedule configured

  /reports/schedule/history:
    get:
      operationId: getReportScheduleHistory
      tags: [reports]
      summary: Get the merchant's report delivery history (last N attempts)
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Maximum number of history entries to return (default 20, max 100)
        - name: format
          in: query
          schema:
            type: string
            enum: [xlsx, pdf]
          description: Filter delivery history by file format
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date
          description: Filter delivery history — only entries on or after this date (YYYY-MM-DD)
        - name: dateTo
          in: query
          schema:
            type: string
            format: date
          description: Filter delivery history — only entries on or before this date (YYYY-MM-DD)
        - name: triggeredBy
          in: query
          schema:
            type: string
            enum: [manual, scheduler]
          description: Filter delivery history by who triggered the send — "manual" or "scheduler"
      responses:
        "200":
          description: Delivery history entries newest-first
          content:
            application/json:
              schema:
                type: object
                required: [logs]
                properties:
                  logs:
                    type: array
                    items:
                      $ref: "#/components/schemas/ReportDeliveryLog"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /reports/schedule/send-now:
