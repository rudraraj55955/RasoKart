      type: object
      required: [delay1, delay2, delay3]
      properties:
        delay1:
          type: integer
          minimum: 0
          description: System default delay in seconds before the first retry (after the 1st failure).
        delay2:
          type: integer
          minimum: 0
          description: System default delay in seconds before the second retry (after the 2nd failure).
        delay3:
          type: integer
          minimum: 0
          description: System default delay in seconds before the third and subsequent retries.

    WebhookRetriesConfig:
      type: object
      required: [maxAttempts, delay1, delay2, delay3]
      properties:
        maxAttempts:
          type: integer
          minimum: 1
          maximum: 10
          description: Total maximum delivery attempts (1 initial + retries). Default is 4 (1 initial + 3 retries).
        delay1:
          type: integer
          minimum: 0
          description: Delay in seconds before the first retry (after the 1st failure).
        delay2:
          type: integer
          minimum: 0
          description: Delay in seconds before the second retry (after the 2nd failure).
        delay3:
          type: integer
          minimum: 0
          description: Delay in seconds before the third retry (after the 3rd failure).

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
          description: Original file name.
        size:
          type: integer
          minimum: 1
          description: File size in bytes.
        contentType:
          type: string
          minLength: 1
          description: MIME type of the file (e.g. image/jpeg).
        contentHash:
          type: string
          pattern: '^[0-9a-f]{64}$'
          description: SHA-256 hex digest of the file contents. When provided, the server deduplicates uploads — if an identical file has already been uploaded by this merchant, the existing objectPath is returned and no new presigned URL is issued.
    UploadUrlResponse:
      type: object
      required: [objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
          description: >
            Presigned GCS URL for PUT upload.
            Omitted when deduplicated is true — no upload is needed in that case.
        objectPath:
          type: string
          description: Normalized object path (e.g. /objects/uploads/uuid). Store this in your database.
        deduplicated:
          type: boolean
          description: >
            True when the file was already uploaded (matched by contentHash). In this case
            uploadURL is absent — no upload is needed; use objectPath directly.
        metadata:
          $ref: '#/components/schemas/UploadUrlRequest'

