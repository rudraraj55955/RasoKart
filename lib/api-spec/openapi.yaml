  /github-sync/config:
    get:
      operationId: getGithubSyncConfig
      tags: [github-sync]
      summary: Get GitHub sync configuration
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current GitHub sync configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GithubSyncConfig"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden — admin access required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateGithubSyncConfig
      tags: [github-sync]
      summary: Update GitHub sync configuration
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled:
                  type: boolean
                  description: Whether the GitHub sync job is enabled
                schedule:
                  type: string
                  description: Cron expression for the sync schedule (e.g. "0 2 * * *")
                failureThreshold:
                  type: integer
                  minimum: 1
                  description: Number of consecutive sync failures required before the admin dashboard banner and the escalation email fire.
                renotifyInterval:
                  type: integer
                  minimum: 1
                  description: Once the failure threshold is crossed, only re-send the escalation email every N additional consecutive failures beyond it.
                divergeAction:
                  type: string
                  enum: [alert_only, alert_and_push]
                  description: "What the scheduled sync should do when the remote has diverged commits. alert_only skips the push; alert_and_push force-pushes but emails admins."
      responses:
        "200":
          description: Updated configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GithubSyncConfig"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden — admin access required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /github-sync/status:
    get:
      operationId: getGithubSyncStatus
      tags: [github-sync]
      summary: Get last GitHub sync status
      security:
        - bearerAuth: []
      responses:
        "200":
          description: GitHub sync status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GithubSyncStatus"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden — admin access required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /github-sync/history/{id}/log:
    get:
      operationId: getGithubSyncRunLog
      tags: [github-sync]
      summary: Get the full captured log output for a specific sync run
      description: Returns the full stdout/stderr captured during a specific sync run's git fetch/push commands, keyed by the history entry's id.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Full log output for the sync run
          content:
