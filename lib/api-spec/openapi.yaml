    post:
      operationId: resetAdminMerchantReportScheduleFailures
      tags: [reports]
      summary: Admin — reset the consecutive failure count on a merchant's report schedule to 0
      parameters:
        - name: merchantId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Failure count reset
          content:
            application/json:
              schema:
                type: object
                required: [schedule]
                properties:
                  schedule:
                    $ref: "#/components/schemas/ReportSchedule"
