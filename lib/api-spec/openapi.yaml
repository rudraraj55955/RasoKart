          in: query
          description: "Filter logs by merchant ID — matches rows where target_id equals the merchant, as well as bulk-action rows whose details.merchantIds array includes the merchant"
          schema: { type: integer }
        - name: settingKey
          in: query
          description: "Sub-filter for setting/config logs. For action=setting_updated, matches details->>'key'. For action=system_config_updated, matches details->>'section'. For action=provider_integration_updated, matches details->>'providerKey'."
          schema: { type: string }
        - name: performedBy
          in: query
          description: "Filter by actor type: 'system' returns only automated/scheduler entries (adminEmail='system' or adminId=0); 'admin' returns only human-initiated entries."
          schema: { type: string, enum: [system, admin] }
        - name: actorEmail
          in: query
          description: "Filter logs by actor email using a partial case-insensitive match (ilike). Useful for narrowing down to a specific admin user's actions."
          schema: { type: string }
