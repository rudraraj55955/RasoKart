      properties:
        name:
          type: string
          minLength: 1
          maxLength: 40
        rawInput:
          type: string
          minLength: 1
        filterData:
          type: object
          description: SmartFilter JSON object
          additionalProperties: true

    MerchantSavedFilter:
      type: object
      required: [id, name, rawInput, filterData, context, sortOrder, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        rawInput:
          type: string
        filterData:
          type: object
          description: SmartFilter JSON object
          additionalProperties: true
        context:
          type: string
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time

    CreateMerchantSavedFilterInput:
      type: object
      required: [name, rawInput, filterData, context]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 40
        rawInput:
          type: string
          minLength: 1
        filterData:
          type: object
          description: SmartFilter JSON object
          additionalProperties: true
        context:
          type: string

    RenameMerchantSavedFilterInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 40

    ReorderMerchantSavedFiltersInput:
      type: object
      required: [ids, context]
      properties:
        ids:
          type: array
          items:
            type: integer
        context:
          type: string

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    MerchantProfileUpdateInput:
      type: object
      description: Fields the merchant can update on their own profile. All fields are optional; only provided fields are updated.
      properties:
        businessName:
          type: string
          description: Legal or trading business name (max 200 chars)
          maxLength: 200
        contactName:
          type: string
          description: Primary contact person name (max 200 chars)
          maxLength: 200
        phone:
          type: string
          description: Contact phone number (max 50 chars)
          maxLength: 50
        website:
          type: ["string", "null"]
          description: Business website URL (max 500 chars). Pass null or empty string to clear it.
          maxLength: 500

    MerchantRegisterInput:
      type: object
      required: [email, password, businessName, contactName, phone]
      properties:
        email:
          type: string
        password:
          type: string
        businessName:
          type: string
        contactName:
          type: string
        phone:
          type: string
        website:
          type: ["string", "null"]

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    MerchantOtpRequestInput:
      type: object
      required: [identifier]
      properties:
        identifier:
          type: string
          description: Registered merchant email or mobile number.

    MerchantOtpVerifyInput:
      type: object
      required: [identifier, otp]
      properties:
        identifier:
          type: string
        otp:
          type: string
          description: 6-digit one-time code.

    MerchantPasswordResetInput:
      type: object
      required: [identifier, otp, newPassword]
      properties:
        identifier:
          type: string
        otp:
          type: string
          description: 6-digit one-time code.
        newPassword:
          type: string
          description: New password — minimum 8 characters, at least 1 letter and 1 number.

    User:
      type: object
      required: [id, email, role, name, createdAt]
      properties:
        id:
          type: integer
        email:
          type: string
        role:
          type: string
          enum: [admin, merchant, payout_merchant, payout_admin, payout_super_admin, agent]
        name:
          type: string
        isActive:
          type: boolean
        isSuperAdmin:
          type: boolean
          description: True only for the Super Admin who may edit company branding/support settings; other admins get a read-only view.
        canManagePayoutProviderCredentials:
          type: boolean
          description: When true (granted only by Super Admin), this payout_admin/payout_super_admin user may view and edit payout provider API credentials.
        permissionsJson:
          type: object
          description: Granular permission flags for payout admins (e.g. canTopUpWallet, canApprovePayouts, canManageAgents).
          additionalProperties: true
        effectivePermissions:
          type: object
          nullable: true
          description: >
            IAM effective permission map. null = migration not yet run (soft/legacy mode, all access).
            { "__all__": true } = Super Admin (unrestricted). Otherwise a flat boolean map keyed by permission key.
          additionalProperties: true
        merchantId:
          type: ["integer", "null"]
        merchantStatus:
          type: ["string", "null"]
        businessName:
          type: ["string", "null"]
          description: Merchant's business name. Only populated for merchant-role users.
        contactName:
          type: ["string", "null"]
          description: Merchant's primary contact name. Only populated for merchant-role users.
        phone:
          type: ["string", "null"]
          description: Merchant's contact phone number. Only populated for merchant-role users.
        website:
          type: ["string", "null"]
          description: Merchant's website URL. Only populated for merchant-role users.
        status:
          type: ["string", "null"]
          description: Alias of merchantStatus, kept for merchant-portal profile page consumers.
