      parameters:
        - name: merchantId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Schedule (null if none configured)
          content:
            application/json:
              schema:
                type: object
                required: [schedule]
                properties:
                  schedule:
                    oneOf:
                      - $ref: "#/components/schemas/ReportSchedule"
                      - type: "null"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
    put:
      operationId: upsertAdminMerchantReportSchedule
      tags: [reports]
      summary: Admin — create or update a merchant's report schedule
      parameters:
        - name: merchantId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                frequency:
                  type: string
                  enum: [weekly, monthly]
                format:
                  type: string
                  enum: [xlsx, pdf]
                isActive:
                  type: boolean
                dayOfWeek:
                  type: integer
                  minimum: 0
                  maximum: 6
                  description: Day of week for weekly reports (0=Sun, 1=Mon, …, 6=Sat)
                dayOfMonth:
                  type: integer
                  minimum: 1
                  maximum: 28
                  description: Day of month for monthly reports (1–28)
                nextRunAt:
                  type: ["string", "null"]
                  description: Override the next scheduled run date. Pass null to clear an existing override.
      responses:
        "200":
          description: Updated schedule
          content:
            application/json:
              schema:
                type: object
                required: [schedule]
                properties:
