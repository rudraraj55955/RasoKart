name: Deploy to VPS (rasokart.com)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Hetzner VPS
    runs-on: ubuntu-latest
    environment: production-sensitive
    timeout-minutes: 25

    steps:
      - name: Backup, pull, migrate, build, restart, health-check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          known_hosts: ${{ secrets.VPS_KNOWN_HOSTS }}
          script_stop: true
          command_timeout: 20m
          script: |
            set -e
            APP_DIR="/var/www/rasokart"
            ECOSYSTEM="$APP_DIR/ecosystem.config.cjs"
            ENV_FILE="/home/rasokart/shared/.env.production"

            # ── Load production credentials ──────────────────────────────────
            # Real credentials live only on the VPS — never in git.
            # The canonical source is $ENV_FILE (outside the repo).
            # On first deploy it is bootstrapped from ecosystem.config.cjs.
            #
            # set +x prevents bash from tracing commands so no credential
            # values appear anywhere in the workflow logs.
            set +x

            if [ ! -f "$ENV_FILE" ]; then
              mkdir -p "$(dirname "$ENV_FILE")"
              node -e "
            const fs = require('fs');
            try {
              const c = require('$ECOSYSTEM');
              const env = c.apps[0].env || {};
              const lines = Object.entries(env)
                .filter(([k,v]) => v && !String(v).match(/CHANGE_THIS|REPLACE_WITH|placeholder/i))
                .map(([k,v]) => k + '=' + String(v).replace(/[\n\r]/g,''))
                .join('\n');
              fs.writeFileSync('$ENV_FILE', lines + '\n');
            } catch(e) {
              process.stderr.write('Bootstrap error: ' + e.message + '\n');
              process.exit(1);
            }
            "
              chmod 600 "$ENV_FILE"
              echo "Bootstrapped $ENV_FILE from ecosystem.config.cjs"
            fi

            # Source the env file — values never echoed, never traced
            # shellcheck disable=SC1090
            source "$ENV_FILE"

            # Validate presence only — never print the value itself
            if [ -z "$DATABASE_URL" ] || [ "${#DATABASE_URL}" -lt 20 ]; then
              echo "ERROR: DATABASE_URL is missing or too short in $ENV_FILE"
              echo "On VPS: add DATABASE_URL=<connection-string> to $ENV_FILE then chmod 600 $ENV_FILE"
              exit 1
            fi
            if [ -z "$SESSION_SECRET" ]; then
              echo "WARNING: SESSION_SECRET not in $ENV_FILE — will rely on ecosystem.config.cjs"
            fi

            echo "=== Credentials loaded from $ENV_FILE ==="

            # ── [1/9] Backup ──────────────────────────────────────────────────
            echo "=== [1/9] Create rollback backup ==="
            BACKUP_DIR="/var/www/rasokart-backups/$(date +%Y%m%d_%H%M%S)"
            mkdir -p "$BACKUP_DIR"
            pg_dump "$DATABASE_URL" -Fc -f "$BACKUP_DIR/rasokart_db.dump" \
              && echo "DB backup OK" || echo "WARNING: pg_dump failed (non-fatal, continuing)"
            ls -dt /var/www/rasokart-backups/*/ 2>/dev/null | tail -n +6 | xargs rm -rf 2>/dev/null || true

            # ── [2/9] Pull ────────────────────────────────────────────────────
            echo "=== [2/9] Pull latest main branch ==="
            cd "$APP_DIR"
            # Back up ecosystem.config.cjs before git reset --hard replaces it
            # with the placeholder version from the repo
            cp "$ECOSYSTEM" /tmp/rasokart_ecosystem_live.cjs
            git fetch origin main
            git reset --hard origin/main
            # Restore the live credentials file
            cp /tmp/rasokart_ecosystem_live.cjs "$ECOSYSTEM"
            echo "ecosystem.config.cjs restored with live credentials"
            COMMIT_SHORT=$(git rev-parse --short HEAD)
            COMMIT_FULL=$(git rev-parse HEAD)
            echo "Deployed commit: $COMMIT_FULL ($COMMIT_SHORT)"

            # ── [3/9] Install ─────────────────────────────────────────────────
            echo "=== [3/9] Install dependencies ==="
            pnpm install --frozen-lockfile

            # ── [4/9] Migrate ─────────────────────────────────────────────────
            # DATABASE_URL is exported from the sourced env file above and
            # inherited by the pnpm child process — no need to pass it explicitly
            echo "=== [4/9] Run database migrations ==="
            pnpm --filter @workspace/scripts run db-migrate

            # ── [5/9] Build API ───────────────────────────────────────────────
            echo "=== [5/9] Build API server ==="
            pnpm --filter @workspace/api-server run build

            # ── [6/9] Restart PM2 ─────────────────────────────────────────────
            # PM2 reads the restored ecosystem.config.cjs which has real credentials
            echo "=== [6/9] Restart PM2 ==="
            pm2 restart rasokart-api
            sleep 6
            pm2 status

            # ── [7/9] Build frontend ──────────────────────────────────────────
            echo "=== [7/9] Build frontend ==="
            BASE_PATH=/ pnpm --filter @workspace/rpay run build

            # ── [8/9] Nginx ───────────────────────────────────────────────────
            echo "=== [8/9] Nginx config check ==="
            sudo nginx -t 2>&1 && echo "Nginx OK" || echo "WARNING: nginx issues (non-fatal)"

            # ── [9/9] Health check ────────────────────────────────────────────
            echo "=== [9/9] Deep health check ==="
            sleep 4
            HEALTH=$(curl -sf --max-time 15 https://rasokart.com/api/healthz/deep \
              || echo '{"status":"curl_failed"}')
            echo "Health: $HEALTH"
            STATUS=$(echo "$HEALTH" | python3 -c \
              "import sys,json; print(json.load(sys.stdin).get('status','unknown'))" \
              2>/dev/null || echo "parse_error")
            DEMO=$(echo "$HEALTH" | python3 -c \
              "import sys,json; print(json.load(sys.stdin).get('checks',{}).get('demo_credentials','?'))" \
              2>/dev/null || echo "?")
            echo "status=$STATUS  demo_credentials=$DEMO"
            if [ "$STATUS" != "ok" ]; then
              echo "HEALTH CHECK FAILED"
              exit 1
            fi
            echo "=== Deploy complete: $COMMIT_SHORT is live on rasokart.com ==="

  verify:
    name: Verify live URLs on rasokart.com
    runs-on: ubuntu-latest
    needs: deploy
    timeout-minutes: 5

    steps:
      - name: Check all policy pages, API routes, and static files
        run: |
          set -e
          FAIL=0
          check() {
            CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$1")
            [ "$CODE" = "200" ] \
              && echo "OK   $CODE  $1" \
              || { echo "FAIL $CODE  $1"; FAIL=1; }
          }
          check https://rasokart.com/api/healthz
          check https://rasokart.com/privacy-policy
          check https://rasokart.com/terms-and-conditions
          check https://rasokart.com/refund-cancellation-policy
          check https://rasokart.com/service-delivery-policy
          check https://rasokart.com/contact-us
          check https://rasokart.com/grievance-redressal-policy
          check https://rasokart.com/pricing-fees-settlement-policy
          check https://rasokart.com/merchant-agreement
          check https://rasokart.com/prohibited-businesses
          check https://rasokart.com/kyc-aml-policy
          check https://rasokart.com/payment-payout-settlement-policy
          check https://rasokart.com/chargeback-dispute-policy
          check https://rasokart.com/cookie-policy
          check https://rasokart.com/security-policy
          check https://rasokart.com/disclaimer
          check https://rasokart.com/admin/legal-pages
          check https://rasokart.com/admin/login
          check https://rasokart.com/merchant/login
          check https://rasokart.com/sitemap.xml
          check https://rasokart.com/robots.txt
          echo "--- Contact form POST ---"
          CF=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
            -X POST https://rasokart.com/api/public/contact \
            -H "Content-Type: application/json" \
            -d '{"name":"GH Actions","email":"ci@rasokart.com","subject":"CI Verify","category":"general","message":"Automated post-deploy verification."}')
          [ "$CF" = "200" ] \
            && echo "OK   $CF  POST /api/public/contact" \
            || { echo "FAIL $CF  POST /api/public/contact"; FAIL=1; }
          exit $FAIL
