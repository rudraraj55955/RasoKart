name: Build RasoKart Debug APK

on:
  push:
    branches: [main]
    paths:
      - 'artifacts/rasokart-apk/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── Install Gradle 8.5 directly (no gradlew in repo) ───────────────────
      - name: Install Gradle 8.5
        run: |
          curl -fsSL https://services.gradle.org/distributions/gradle-8.5-bin.zip \
            -o /tmp/gradle-8.5-bin.zip
          unzip -q /tmp/gradle-8.5-bin.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.5/bin" >> "$GITHUB_PATH"

      # ── Accept Android SDK licenses ────────────────────────────────────────
      - name: Accept Android SDK licenses
        run: |
          CMDLINE="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"
          if [ -f "$CMDLINE" ]; then
            yes | "$CMDLINE" --licenses > /dev/null 2>&1 || true
          else
            CMDLINE="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
            [ -f "$CMDLINE" ] && yes | "$CMDLINE" --licenses > /dev/null 2>&1 || true
          fi
          echo "SDK licenses accepted"
          echo "ANDROID_HOME: $ANDROID_HOME"
          echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"

      # ── Generate PNG launcher icons using Pillow ───────────────────────────
      - name: Install Pillow
        run: pip install Pillow

      - name: Generate launcher icons
        working-directory: artifacts/rasokart-apk
        run: |
          python3 << 'PYEOF'
          import os
          from PIL import Image, ImageDraw, ImageFont

          SIZES = {
              'mipmap-mdpi':    48,
              'mipmap-hdpi':    72,
              'mipmap-xhdpi':   96,
              'mipmap-xxhdpi':  144,
              'mipmap-xxxhdpi': 192,
          }

          BG  = (15, 23, 42)    # #0f172a dark navy
          FG  = (245, 158, 11)  # #f59e0b amber gold
          FONT_PATH = "/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf"

          for folder, size in SIZES.items():
              path = f"app/src/main/res/{folder}"
              os.makedirs(path, exist_ok=True)

              img  = Image.new('RGBA', (size, size), (0, 0, 0, 0))
              draw = ImageDraw.Draw(img)

              r = size // 5
              m = size // 12
              draw.rounded_rectangle([m, m, size - m, size - m], radius=r, fill=BG)

              font_size = max(10, size // 3)
              try:
                  font = ImageFont.truetype(FONT_PATH, font_size)
              except Exception:
                  font = ImageFont.load_default()

              text = "RK"
              bbox = draw.textbbox((0, 0), text, font=font)
              tw = bbox[2] - bbox[0]
              th = bbox[3] - bbox[1]
              x  = (size - tw) // 2 - bbox[0]
              y  = (size - th) // 2 - bbox[1]
              draw.text((x, y), text, fill=FG, font=font)

              img.save(f"{path}/ic_launcher.png",       'PNG')
              img.save(f"{path}/ic_launcher_round.png", 'PNG')
              print(f"  {folder}: {size}×{size} ✓")

          print("Icon generation complete.")
          PYEOF

      # ── Gradle build ───────────────────────────────────────────────────────
      - name: Build debug APK
        working-directory: artifacts/rasokart-apk
        run: gradle assembleDebug
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=false"

      # ── Rename and upload ──────────────────────────────────────────────────
      - name: Rename APK
        run: |
          mkdir -p artifacts/rasokart-apk/output
          cp artifacts/rasokart-apk/app/build/outputs/apk/debug/app-debug.apk \
             artifacts/rasokart-apk/output/RasoKart-v1.0.2-debug.apk
          echo "APK size: $(du -sh artifacts/rasokart-apk/output/RasoKart-v1.0.2-debug.apk | cut -f1)"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RasoKart-v1.0.2-debug
          path: artifacts/rasokart-apk/output/RasoKart-v1.0.2-debug.apk
          retention-days: 30

      - name: Build summary
        run: |
          echo "## ✅ RasoKart v1.0.2 Debug APK" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| App name | RasoKart |" >> $GITHUB_STEP_SUMMARY
          echo "| Package | com.rasokart.app.debug |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | 1.0.2 (code 3) |" >> $GITHUB_STEP_SUMMARY
          echo "| Min SDK | 26 (Android 8.0+) |" >> $GITHUB_STEP_SUMMARY
          echo "| Target URL | https://rasokart.com |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download from the **Artifacts** section above." >> $GITHUB_STEP_SUMMARY
